<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>RIKCADビューワー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: 'Noto Sans JP', 'Meiryo', sans-serif; background: #f0f2f5; color: #333; display: flex; flex-direction: column; }

  /* ===== ナビバー ===== */
  .navbar {
    background: #fff; border-bottom: 1px solid #e0e0e0;
    display: flex; align-items: stretch; height: 48px; padding: 0 4px;
    flex: 0 0 auto;
  }
  .nav-main { display: flex; align-items: stretch; flex: 1; overflow-x: auto; }
  .nav-item {
    display: flex; align-items: center; gap: 5px;
    padding: 0 11px; font-size: 12px; color: #555;
    cursor: pointer; text-decoration: none; white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    background: none; border-top: none; border-left: none; border-right: none;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .nav-item:hover { color: #1a6fc4; }
  .nav-item.active { color: #1a6fc4; border-bottom-color: #1a6fc4; font-weight: 600; }
  .nav-item svg { flex-shrink: 0; width: 14px; height: 14px; }
  .nav-item.hacchukanri svg { color: #e53935; }
  .nav-right {
    display: flex; align-items: center;
    margin-left: auto; border-left: 1px solid #e8e8e8; padding-left: 2px; flex-shrink: 0;
  }

  .header {
    background: rgb(246, 248, 250);
    color: #1f2937;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex: 0 0 auto;
    border-bottom: 1px solid #e0e3e7;
  }
  .header h1 { font-size: 16px; font-weight: bold; }
  .header .sub { font-size: 12px; opacity: 0.7; margin-top: 2px; }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  .btn {
    padding: 8px 16px;
    border: none;
    border-radius: 5px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    font-weight: bold;
  }
  .btn-primary { background: #4a7cc7; color: white; }
  .btn-primary:hover { background: #3d6bb0; }
  .btn-secondary { background: rgba(255,255,255,0.15); color: white; }
  .btn-secondary:hover { background: rgba(255,255,255,0.25); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .header .btn-secondary { background: rgb(0, 178, 125); color: white; }
  .header .btn-secondary:hover { background: rgb(0, 153, 107); }

  .main { flex: 1 1 auto; display: flex; min-height: 0; position: relative; }

  /* ── ドロップゾーン（初期表示） ───────────────────── */
  .drop-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #eef1f6;
    z-index: 5;
  }
  .drop-zone {
    border: 2px dashed #aab;
    border-radius: 8px;
    padding: 48px 64px;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s;
    color: #778;
    font-size: 14px;
    background: white;
  }
  .drop-zone:hover, .drop-zone.dragover { background: #f0f4ff; border-color: #4a7cc7; }
  .drop-zone .icon { font-size: 40px; margin-bottom: 10px; }
  .drop-zone input { display: none; }

  /* ── 3Dビューア ──────────────────────────────────── */
  .viewer { flex: 1 1 auto; position: relative; min-width: 0; }
  #viewerCanvas { width: 100%; height: 100%; display: block; touch-action: none; }

  .loading-overlay {
    position: absolute; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    background: rgba(240,242,245,0.85);
    z-index: 10;
    font-size: 14px;
    color: #1a3a5c;
    font-weight: bold;
  }
  .loading-overlay.show { display: flex; }

  .measure-toast {
    position: absolute; left: 50%; bottom: 56px; transform: translateX(-50%) translateY(10px);
    background: rgba(26,58,92,0.92); color: #fff;
    padding: 8px 16px; border-radius: 6px; font-size: 13px;
    pointer-events: none; z-index: 20; white-space: nowrap;
    opacity: 0; transition: opacity .2s, transform .2s;
  }
  .measure-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .hint {
    position: absolute; left: 12px; bottom: 12px;
    background: rgba(0,0,0,0.55); color: white;
    padding: 6px 12px; border-radius: 4px; font-size: 12px;
    pointer-events: none;
  }

  /* ── PDF重ね表示パネル ──────────────────────────── */
  .pdf-panel {
    position: absolute; right: 12px; top: 12px;
    width: 240px;
    background: rgba(255,255,255,0.97);
    border: 1px solid #ddd; border-radius: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    padding: 10px 12px;
    font-size: 12px;
    display: none;
  }
  .pdf-panel.show { display: block; }
  .pdf-panel .pdf-title { font-weight: bold; color: #1a3a5c; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .pdf-panel .pdf-title .close-btn { cursor: pointer; color: #999; background: none; border: none; font-size: 14px; }
  .pdf-panel label { display: block; color: #666; margin: 8px 0 2px; }
  .pdf-panel input[type="range"] { width: 100%; }
  .pdf-panel input[type="number"] { width: 100%; padding: 5px 6px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; }
  .pdf-panel .pdf-row { display: flex; align-items: center; gap: 6px; }
  .pdf-panel .pdf-row span { width: 46px; text-align: right; color: #444; font-variant-numeric: tabular-nums; }
  .pdf-panel .pdf-page-nav { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 4px; }
  .pdf-panel .pdf-page-nav button { padding: 2px 8px; }
  .pdf-panel .btn { width: 100%; margin-top: 8px; }
  .pdf-edit-btn.active, .btn.active { background: #ff8800 !important; }

  /* ── 情報パネル ──────────────────────────────────── */
  .panel {
    width: 340px; flex: 0 0 auto;
    background: white;
    border-left: 1px solid #ddd;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .panel-header {
    padding: 12px 16px;
    border-bottom: 1px solid #eee;
    font-size: 13px; font-weight: bold; color: #555;
    display: flex; justify-content: space-between; align-items: center;
  }
  .panel-header .close-btn {
    cursor: pointer; color: #999; font-size: 16px; line-height: 1;
    background: none; border: none;
  }
  .panel-body { flex: 1; overflow-y: auto; padding: 14px 16px; font-size: 13px; }
  .panel-empty { color: #999; font-size: 13px; padding: 16px; text-align: center; }

  .prop-name { font-size: 15px; font-weight: bold; color: #1a3a5c; margin-bottom: 2px; word-break: break-all; }
  .prop-type { font-size: 11px; color: #888; margin-bottom: 12px; }

  table.prop-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
  table.prop-table th {
    text-align: left; font-size: 11px; color: #888; font-weight: normal;
    padding: 4px 6px; width: 40%; vertical-align: top; border-bottom: 1px solid #f0f0f0;
  }
  table.prop-table td {
    font-size: 12px; padding: 4px 6px; vertical-align: top;
    word-break: break-all; border-bottom: 1px solid #f0f0f0;
  }

  .pset-title {
    font-size: 12px; font-weight: bold; color: #444;
    margin: 14px 0 4px; padding-bottom: 4px; border-bottom: 1px solid #eee;
  }

  /* ── 数量一覧パネル ──────────────────────────────── */
  .qty-panel {
    width: 380px; flex: 0 0 auto;
    background: white;
    border-right: 1px solid #ddd;
    display: none; flex-direction: column;
    overflow: hidden;
  }
  .qty-panel.show { display: flex; }
  .qty-resize-handle {
    width: 5px; flex: 0 0 auto; cursor: col-resize;
    background: transparent; position: relative; z-index: 5; display: none;
  }
  .qty-panel.show + .qty-resize-handle { display: block; }
  .qty-resize-handle:hover, .qty-resize-handle.dragging { background: #cfe0ff; }
  .qty-panel-header {
    padding: 12px 16px;
    border-bottom: 1px solid #eee;
    font-size: 13px; font-weight: bold; color: #555;
    flex: 0 0 auto;
  }
  .qty-panel-body { flex: 1; overflow-y: auto; }
  .qty-empty { color: #999; font-size: 13px; padding: 24px 16px; text-align: center; }

  table.qty-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  table.qty-table thead th {
    position: sticky; top: 0; background: #f5f6f8; z-index: 1;
    text-align: left; font-size: 11px; color: #888; font-weight: normal;
    padding: 6px 8px; border-bottom: 1px solid #ddd;
  }
  table.qty-table td {
    padding: 5px 8px; border-bottom: 1px solid #f0f0f0;
    vertical-align: middle; word-break: break-all;
  }
  table.qty-table td.qty-cat { font-weight: bold; color: #1a3a5c; background: #f7f9fc; }
  table.qty-table td.qty-group { color: #333; background: #fbfbfd; }
  table.qty-table td.qty-param { color: #555; }
  table.qty-table td.qty-value { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
  table.qty-table td.qty-unit { color: #888; white-space: nowrap; }
  table.qty-table tr.qty-row { cursor: pointer; }
  table.qty-table tr.qty-row:hover td { background: #eef4ff; }
  table.qty-table tr.qty-row.active td { background: #cfe0ff; }
  table.qty-table td.qty-price { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; color: #1a6f4c; }

  /* ── 価格検索（Dify連携）─────────────────────────── */
  .dify-modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    align-items: center; justify-content: center; z-index: 50;
  }
  .dify-modal-overlay.show { display: flex; }
  .dify-modal {
    background: white; border-radius: 8px; width: 520px; max-width: 92vw;
    max-height: 82vh; display: flex; flex-direction: column; overflow: hidden;
  }
  .dify-modal-header {
    padding: 12px 16px; border-bottom: 1px solid #eee;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 13px; font-weight: bold; color: #555;
  }
  .dify-modal-header button { background: none; border: none; font-size: 16px; cursor: pointer; color: #888; }
  .dify-modal-body { padding: 14px 18px; overflow-y: auto; flex: 1 1 auto; font-size: 12px; }
  .dify-modal-footer { padding: 12px 18px; border-top: 1px solid #e5e7eb; display: flex; gap: 8px; justify-content: flex-end; }
  .dify-status { font-size: 12px; color: #666; margin-bottom: 10px; }
  .dify-status.error { color: #c0392b; }
  table.dify-result-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
  table.dify-result-table th, table.dify-result-table td {
    padding: 5px 6px; border-bottom: 1px solid #f0f0f0; font-size: 12px; text-align: left;
  }
  table.dify-result-table th { background: #f5f6f8; color: #666; font-weight: normal; }
  table.dify-result-table td.dify-num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .dify-result-meta { font-size: 11.5px; color: #888; margin: -4px 0 10px; }
  .dify-result-meta .tag-nohit { color: #c0392b; font-weight: bold; }
</style>
</head>

<script>
  // ===== ナビバー：index.htmlへの遷移 =====
  function navClick(key) {
    sessionStorage.setItem('openex_nav_target', key);
    window.location.href = 'index.html';
  }
  function setActiveNav(key) {
    document.querySelectorAll('.nav-item[data-nav]').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.nav === key);
    });
  }
  setActiveNav('bukken');
</script>

<div class="header">
  <div>
    <div class="h1">RIKCADビューワー</div>
    <div class="sub">IFCファイルを表示し、部材をクリックすると情報を確認できます</div>
  </div>
  <div class="header-actions">
    <button class="btn btn-secondary" id="buildQtyBtn" style="display:none">📋 一覧表作成</button>
    <button class="btn btn-secondary" id="planViewToggle" style="display:none">📐 平面図モード: OFF</button>
    <button class="btn btn-secondary" id="measureToggle" style="display:none">📏 距離計測: OFF</button>
    <button class="btn btn-secondary" id="areaMeasureToggle" style="display:none">🟩 面積計測: OFF</button>
    <button class="btn btn-secondary" id="hidePlantsToggle" style="display:none">🌳 植栽を非表示</button>
    <button class="btn btn-secondary" id="showAllBtn" style="display:none">👁 表示を戻す</button>
    <button class="btn btn-secondary" id="pdfLoadBtn" style="display:none">📄 図面を重ねる</button>
    <input type="file" id="pdfFileInput" accept=".pdf,.dxf" style="display:none">
    <button class="btn btn-secondary" id="reloadBtn" style="display:none">📂 別のファイルを開く</button>
  </div>
</div>

<div class="main">

  <div class="drop-overlay" id="dropOverlay">
    <div class="drop-zone" id="dropZone">
      <div class="icon">🏢</div>
      <div>クリックまたはドラッグ＆ドロップ</div>
      <div style="font-size:12px; margin-top:4px;">.ifc ファイルを選択してください</div>
      <input type="file" id="fileInput" accept=".ifc">
    </div>
  </div>

  <div class="qty-panel" id="qtyPanel">
    <div class="qty-panel-header">
      数量一覧
      <button class="btn btn-primary" id="transferToEstimateBtn" style="display:block; width:100%; margin-top:8px; font-size:12px; padding:6px 10px;">選択した要素を見積へ転記</button>
    </div>
    <div class="qty-panel-body" id="qtyBody">
      <div class="qty-empty">IFCファイルを読み込むと数量が表示されます</div>
    </div>
  </div>

  <div class="qty-resize-handle" id="qtyResizeHandle" title="ドラッグで幅を調整"></div>

  <div class="viewer">
    <canvas id="viewerCanvas"></canvas>
    <div class="loading-overlay" id="loadingOverlay">読み込み中...</div>
    <div class="hint" id="hint" style="display:none">部材をクリックすると詳細が表示されます（ドラッグで回転、ホイールでズーム、Shift+クリックで複数選択）</div>
    <div class="measure-toast" id="measureToast"></div>

    <div class="pdf-panel" id="pdfPanel">
      <div class="pdf-title">
        <span id="overlayPanelTitle">📄 図面重ね表示</span>
        <button class="close-btn" id="pdfCloseBtn">✕</button>
      </div>

      <div class="pdf-page-nav" id="pdfPageNav" style="display:none">
        <button class="btn btn-secondary" id="pdfPrevPage">◀</button>
        <span id="pdfPageLabel">1 / 1</span>
        <button class="btn btn-secondary" id="pdfNextPage">▶</button>
      </div>

      <label style="display:flex; align-items:center; gap:6px; margin-bottom:8px;">
        <input type="checkbox" id="pdfVisibleToggle" checked style="width:auto;">

transferToEstimateBtn.addEventListener('click', async () => {
  const checked = document.querySelectorAll('#qtyBody input.qty-select:checked');
  if (!checked.length) { alert('行を選択してください'); return; }

  // property_id を StorageURL から取得
  const urlParam = new URLSearchParams(location.search).get('url') || '';
  const pidMatch = urlParam.match(/property-files\/([^/]+)\//);
  const propertyId = pidMatch ? pidMatch[1] : null;
  if (!propertyId) {
    alert('物件IDを特定できません。\n物件ファイル一覧からIFCファイルを開いてください。');
    return;
  }

  // チェック済みグループをRIKCAD互換JSONに変換
  const CATEGORY_TYPE = { '壁': 4, 'スラブ': 5, 'メッシュ': 6, '屋根': 7, 'オブジェクト': 1, 'ランプ': 3, '窓': 8, '柱': 1 };
  const items = [];
  const seen = new Set();
  for (const chk of checked) {
    const key = chk.dataset.group;
    if (seen.has(key)) continue;
    seen.add(key);
    const meta = groupKeyToMeta.get(key);
    if (!meta) continue;
    const type = CATEGORY_TYPE[meta.category] ?? 1;
    const p = meta.params || {};
    let suuryo = 0, paramParts = [];
    if (type === 4) {
      const h = p['高さ'], a = p['表面積'], l = p['壁中心長さ'];
      if (h != null) { paramParts.push(`塀高さ:${(h / 1000).toFixed(3)}m`); suuryo = parseFloat((h / 1000).toFixed(3)); }
      if (a != null) { paramParts.push(`基準線面積:${a.toFixed(3)}㎡`); }
      if (l != null) { paramParts.push(`基準線長さ:${(l / 1000).toFixed(3)}m`); if (!suuryo) suuryo = parseFloat((l / 1000).toFixed(3)); }
    } else if ([5, 6, 7].includes(type)) {
      const a = p['面積'] ?? p['表面積'];
      if (a != null) { paramParts.push(`3D上面積:${a.toFixed(3)}㎡`); suuryo = parseFloat(a.toFixed(3)); }
    } else {
      suuryo = Math.round(p['数量'] ?? 1);
    }
    items.push({ file: _ifcFileName, name: meta.label, type, suuryo, kakaku: 0, parameters: paramParts.join('\n') });
  }
  if (!items.length) { alert('変換できる行がありませんでした'); return; }

  transferToEstimateBtn.disabled = true;
  transferToEstimateBtn.textContent = '保存中...';
  try {
    const ts = Date.now();
    const safeName = _ifcFileName.replace(/[^A-Za-z0-9._-]/g, '_').replace(/\.ifc$/i, '');
    const fileName = `${ts}_${safeName}.json`;
    const storagePath = `${propertyId}/${fileName}`;
    const jsonStr = JSON.stringify(items, null, 2);

    // Storage にアップロード
    const upRes = await fetch(`${SB_URL}/storage/v1/object/property-files/${storagePath}`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${ANON_KEY}`, 'Content-Type': 'application/json', 'x-upsert': 'false' },
      body: jsonStr,
    });
    if (!upRes.ok) throw new Error(`Storage upload failed: ${upRes.status}`);

    // property_files テーブルに登録
    const dbRes = await fetch(`${SB}/property_files`, {
      method: 'POST',
      headers: { ...H, Prefer: 'return=minimal' },
      body: JSON.stringify({ property_id: propertyId, name: fileName, storage_path: storagePath, size: new Blob([jsonStr]).size, mime_type: 'application/json', tags: ['ifc-export'] }),
    });
    if (!dbRes.ok) throw new Error(`DB insert failed: ${dbRes.status}`);

    alert(`${items.length}件をJSONとして保存しました。\nファイル名: ${fileName}\n\n「CADから引用」から引用できます。`);
  } catch (err) {
    console.error(err);
    alert('保存に失敗しました: ' + err.message);
  } finally {
    transferToEstimateBtn.disabled = false;
    transferToEstimateBtn.textContent = '選択した要素を見積へ転記';
  }
});

async function loadFile(file) {
  if (!file.name.toLowerCase().endsWith('.ifc')) {

  loadingOverlay.classList.add('show');
  dropOverlay.style.display = 'none';

    await wasmReady;
    const buffer = await file.arrayBuffer();

    if (currentModel) {
      scene.remove(currentModel);
      currentModel = null;
    }
    if (visibleSubsetMesh) {
      scene.remove(visibleSubsetMesh);
      visibleSubsetMesh = null;
    }
    clearMeasurement();
    clearAreaMeasurement();
    exitPlanView();
    if (pdfPivot) removePdf();

    const model = await ifcLoader.parse(buffer);
    scene.add(model);
    currentModel = model;

    fitCameraToModel(model);
    reloadBtn.style.display = '';
    hint.style.display = '';
    pdfLoadBtn.style.display = '';
    measureToggle.style.display = '';
    areaMeasureToggle.style.display = '';
    planViewToggle.style.display = '';
    buildQtyBtn.style.display = '';
    hiddenIds.clear();
    checkedIds.clear();
    selectedIds = new Set();
    document.getElementById('panel').style.display = 'none';
    setActiveQtyGroup(null);
    allModelIdsCache = null;
    visibleSubsetMesh = null;
    showAllBtn.style.display = 'none';
    hidePlantsToggle.style.display = '';
    plantsHidden = false;
    plantHiddenIds.clear();
    hidePlantsToggle.textContent = '🌳 植栽を非表示';

  } catch (err) {
    console.error(err);

    dropOverlay.style.display = 'flex';
  } finally {
    loadingOverlay.classList.remove('show');
  }
}

// 初期カメラの水平方向オフセット倍率（モデル最大辺長に対する比率）
const CAMERA_XZ_RATIO = 0.9;
// 初期カメラの垂直方向オフセット倍率。正=中心より上（見下ろす）、負=中心より下（見上げる）
const CAMERA_Y_RATIO = -0.15;

function fitCameraToModel(model) {
  const box = new THREE.Box3().setFromObject(model);
  if (box.isEmpty()) return;
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z) || 10;

  controls.target.copy(center);
  perspectiveCamera.position.set(
    center.x + maxDim * CAMERA_XZ_RATIO,
    center.y + maxDim * CAMERA_Y_RATIO,
    center.z + maxDim * CAMERA_XZ_RATIO
  );
  perspectiveCamera.near = maxDim / 100;
  perspectiveCamera.far = maxDim * 50;
  perspectiveCamera.updateProjectionMatrix();
  controls.update();
}

// ── 平面図モード（真上から見下ろす表示） ─────────────────
// OrthographicCameraへの切替で真の平行投影にする（PLAN_FOVで疑似平行投影していた旧実装から変更）
const PLAN_POLAR_EPSILON = 0.0001; // 極角ちょうど0だと向きが不安定になるための微小値
let planViewMode = false;
let savedCameraState = null; // 平面図モードOFF時に元の視点へ戻すための退避先
let orthoHalfHeight = 10; // OrthographicCameraのズーム前の縦半分の世界サイズ（resize()が参照）

const planViewToggle = document.getElementById('planViewToggle');
planViewToggle.addEventListener('click', () => {
  if (planViewMode) exitPlanView(); else enterPlanView();
});

function enterPlanView() {
  if (!currentModel || planViewMode) return;
  savedCameraState = {
    position: perspectiveCamera.position.clone(),
    target: controls.target.clone(),
  };

  const anchor = getModelGroundAnchor();
  const target = anchor
    ? new THREE.Vector3(anchor.x, anchor.y, anchor.z)
    : controls.target.clone();
  const span = anchor ? Math.max(anchor.spanX, anchor.spanZ, 1) : 20;
  const height = span * 1.5; // 見下ろす高さ（値自体はほぼ任意、near/farが収まればよい）

  camera = orthoCamera;
  controls.object = orthoCamera;

  orthoHalfHeight = (span / 2) * 1.15; // 余白を持たせて全体が収まるようにする
  orthoCamera.zoom = 1;
  orthoCamera.near = Math.max(height / 100, 0.01);
  orthoCamera.far = height * 3;
  resize(); // orthoHalfHeightを反映してleft/right/top/bottomを設定

  controls.target.copy(target);
  orthoCamera.position.set(target.x, target.y + height, target.z);
  controls.minPolarAngle = PLAN_POLAR_EPSILON;
  controls.maxPolarAngle = PLAN_POLAR_EPSILON;
  controls.update();

  planViewMode = true;
  planViewToggle.textContent = '📐 平面図モード: ON';
  planViewToggle.classList.add('active');
}

function exitPlanView() {
  if (!planViewMode) return;
  controls.minPolarAngle = 0;
  controls.maxPolarAngle = Math.PI;

  camera = perspectiveCamera;
  controls.object = perspectiveCamera;
  if (savedCameraState) {
    perspectiveCamera.position.copy(savedCameraState.position);
    controls.target.copy(savedCameraState.target);
  }
  resize();
  controls.update();

  planViewMode = false;
  savedCameraState = null;
  planViewToggle.textContent = '📐 平面図モード: OFF';
  planViewToggle.classList.remove('active');
}

// ── クリックで部材選択 ───────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let pointerDownPos = null;

canvas.addEventListener('pointerdown', e => {
  pointerDownPos = { x: e.clientX, y: e.clientY };
  if (pdfEditMode && pdfPivot) {
    const point = groundPointAt(e, pdfPivot.position.y);
    if (point) {
      pdfDragOffset.copy(pdfPivot.position).sub(point);
      pdfDragging = true;
    }
  }
});

canvas.addEventListener('pointermove', e => {
  if (pdfDragging && pdfPivot) {
    const point = groundPointAt(e, pdfPivot.position.y);
    if (point) pdfPivot.position.copy(point.add(pdfDragOffset));
    return;
  }
  updateSnapHover(e);
});

canvas.addEventListener('pointerup', e => {
  const wasDraggingPdf = pdfDragging;
  pdfDragging = false;
  if (wasDraggingPdf && pdfPivot) {
    // ドラッグ後にX/Zコントロールへ現在位置を反映
    const cx = +(pdfPivot.position.x - pdfBaseX).toFixed(2);
    const cz = +(pdfPivot.position.z - pdfBaseZ).toFixed(2);
    pdfOffsetXInput.value = cx; document.getElementById('pdfOffsetXVal').textContent = cx.toFixed(1);
    pdfOffsetZInput.value = cz; document.getElementById('pdfOffsetZVal').textContent = cz.toFixed(1);
  }
  if (!pointerDownPos) return;
  const dx = e.clientX - pointerDownPos.x;
  const dy = e.clientY - pointerDownPos.y;
  pointerDownPos = null;
  if (wasDraggingPdf || pdfEditMode) return;
  // 軽くドラッグ（カメラ回転操作）した場合はクリックとみなさない
  if (Math.hypot(dx, dy) > 4) return;
  if (measureMode) {
    handleMeasureClick(e);
  } else if (areaMeasureMode) {
    handleAreaMeasureClick(e);
  } else {
    handlePick(e);
  }
});

// ワールド座標をキャンバス上のピクセル座標（左上原点）に変換する
function worldToScreen(worldPos, rect) {
  const ndc = worldPos.clone().project(camera);
  return {
    x: (ndc.x * 0.5 + 0.5) * rect.width,
    y: (1 - (ndc.y * 0.5 + 0.5)) * rect.height,
  };
}

// 距離計測・面積計測共通: マウス位置から拾う点を決める。
// 頂点の近く（画面上でSNAP_PIXEL_RADIUS以内）ならその頂点にスナップし、
// そうでなければ面上のraycast交点をそのまま使う。
const SNAP_PIXEL_RADIUS = 18;

function computeSnapCandidate(e) {
  if (!currentModel) return null;
  const rect = canvas.getBoundingClientRect();
  const nx = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  const ny = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(new THREE.Vector2(nx, ny), camera);

  const intersects = raycaster.intersectObject(visibleSubsetMesh || currentModel, true);
  if (!intersects.length) return null;
  const hit = intersects[0];

  let point = hit.point.clone();
  let snapped = false;

  const posAttr = hit.face && hit.object.geometry && hit.object.geometry.attributes.position;
  if (posAttr) {
    const idxs = [hit.face.a, hit.face.b, hit.face.c];
    let bestDist = Infinity, bestWorld = null;
    for (const idx of idxs) {
      const world = new THREE.Vector3().fromBufferAttribute(posAttr, idx).applyMatrix4(hit.object.matrixWorld);
      const screen = worldToScreen(world, rect);
      const dx = (e.clientX - rect.left) - screen.x;
      const dy = (e.clientY - rect.top) - screen.y;
      const d = Math.hypot(dx, dy);
      if (d < bestDist) { bestDist = d; bestWorld = world; }
    }
    if (bestWorld && bestDist <= SNAP_PIXEL_RADIUS) {
      point = bestWorld;
      snapped = true;
    }
  }

  return { point, snapped };
}

// 頂点スナップ候補にカーソルが乗っている間、目印を表示する
const snapHoverMarker = new THREE.Mesh(
  new THREE.SphereGeometry(0.09, 12, 12),
  new THREE.MeshBasicMaterial({ color: 0x22cc44, transparent: true, opacity: 0.9, depthTest: false })
);
snapHoverMarker.renderOrder = 1000;
snapHoverMarker.visible = false;
scene.add(snapHoverMarker);

function updateSnapHover(e) {
  if (!(measureMode || areaMeasureMode) || !currentModel) {
    snapHoverMarker.visible = false;
    return;
  }
  const result = computeSnapCandidate(e);
  if (result && result.snapped) {
    snapHoverMarker.position.copy(result.point);
    snapHoverMarker.visible = true;
  } else {
    snapHoverMarker.visible = false;
  }
}

// キャンバス上のポインタ位置から、指定した高さ(y)の水平面との交点を求める
function groundPointAt(e, y) {
  const rect = canvas.getBoundingClientRect();
  const nx = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  const ny = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(new THREE.Vector2(nx, ny), camera);
  const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -y);
  const point = new THREE.Vector3();
  return raycaster.ray.intersectPlane(plane, point) ? point : null;
}

// Shiftキー押下中のクリックは選択への追加/解除、通常クリックは単一選択に置き換える
let selectedIds = new Set();

async function handlePick(e) {
  if (!currentModel) return;
  const rect = canvas.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  // 非表示適用中は表示中サブセットのみを対象にする（隠した要素は選択できない）
  const intersects = raycaster.intersectObject(visibleSubsetMesh || currentModel, true);
  if (!intersects.length) {
    // Shift押下中の空クリックは既存の複数選択を維持する（誤クリックでの解除を防ぐ）
    if (!e.shiftKey) clearSelection();
    return;
  }

  const hit = intersects[0];
  const expressId = ifcLoader.ifcManager.getExpressId(hit.object.geometry, hit.faceIndex);
  if (expressId == null) {
    if (!e.shiftKey) clearSelection();
    return;
  }

  if (e.shiftKey) {
    if (selectedIds.has(expressId)) selectedIds.delete(expressId);
    else selectedIds.add(expressId);
  } else {
    selectedIds = new Set([expressId]);
  }

  await refreshSelectionUI();
}

// 選択状態(selectedIds)を3Dハイライト・情報パネル・一覧表のアクティブ行に反映する共通処理
// （3Dビューアでのクリックと一覧表でのクリックの両方から呼び出す）
async function refreshSelectionUI() {
  await applySelectionHighlight();

  if (selectedIds.size === 0) {
    document.getElementById('panel').style.display = 'none';
    setActiveQtyGroup(null);
  } else if (selectedIds.size === 1) {
    const onlyId = selectedIds.values().next().value;
    await showProperties(currentModel.modelID, onlyId);
    setActiveQtyGroup(idToGroupKeyMap.get(onlyId) || null);
  } else {
    await showMultiSelectionSummary();
    const groupKeys = Array.from(selectedIds).map(id => idToGroupKeyMap.get(id)).filter(Boolean);
    setActiveQtyGroups(groupKeys);
  }
}

async function applySelectionHighlight() {
  if (!currentModel) return;
  if (selectedIds.size === 0) {
    ifcLoader.ifcManager.removeSubset(currentModel.modelID, highlightMaterial, 'ifc-viewer-highlight');
    return;
  }
  const subset = ifcLoader.ifcManager.createSubset({
    scene,
    modelID: currentModel.modelID,
    ids: Array.from(selectedIds),
    removePrevious: true,
    material: highlightMaterial,
    customID: 'ifc-viewer-highlight',
  });
  if (subset) subset.renderOrder = 999; // 元の面より必ず手前に描画する
}

// 複数選択中は個別のプロパティ表は出さず、件数・名称・数量の一覧と縦計のみの簡易表示にする
async function showMultiSelectionSummary() {
  const panel = document.getElementById('panel');
  const body = document.getElementById('panelBody');
  panel.style.display = 'flex';
  body.innerHTML = '<div class="panel-empty">読み込み中...</div>';

  const ids = Array.from(selectedIds);
  // 一覧表と同じ材質・名称・数量パラメータを表示する（一覧表に集計済みの要素のみ数量が出る）
  const items = await Promise.all(ids.map(async id => {
    const groupKey = idToGroupKeyMap.get(id);
    const meta = groupKey ? groupKeyToMeta.get(groupKey) : null;
    if (meta) return { label: meta.label, category: meta.category, params: meta.params };
    try {
      const props = await ifcLoader.ifcManager.getItemProperties(currentModel.modelID, id, false);
      return { label: fieldValue(props.Name) || `(ExpressID: ${id})`, category: null, params: null };
    } catch (err) {
      return { label: `(ExpressID: ${id})`, category: null, params: null };
    }
  }));

  // 項目名（＋単位）ごとの縦計を集計
  const totals = new Map(); // key: paramName -> { paramName, unit, sum }
  let rowsHtml = '';
  for (const item of items) {
    const paramNames = item.category ? (CATEGORY_PARAMS[item.category] || []) : [];
    const visibleParams = paramNames.filter(p => item.params && item.params[p] != null);

    if (!visibleParams.length) {
      rowsHtml += `<tr class="qty-row"><td class="qty-group" colspan="2">${escHtml(item.label)}</td><td class="qty-value" colspan="2" style="color:#999;">-</td></tr>`;
      continue;
    }
    visibleParams.forEach((paramName, i) => {
      const value = item.params[paramName];
      const unit = UNIT_MAP[paramName] || '';
      const valueText = INT_PARAMS.has(paramName) ? String(Math.round(value)) : value.toFixed(2);
      rowsHtml += '<tr class="qty-row">'
        + (i === 0 ? `<td class="qty-group" rowspan="${visibleParams.length}">${escHtml(item.label)}</td>` : '')
        + `<td class="qty-param">${escHtml(paramName)}</td><td class="qty-value">${valueText}</td><td class="qty-unit">${unit}</td></tr>`;
      const key = paramName + '||' + unit;
      const acc = totals.get(key) || { paramName, unit, sum: 0 };
      acc.sum += value;
      totals.set(key, acc);
    });
  }

  const totalsHtml = Array.from(totals.values()).map(t => {
    const valueText = INT_PARAMS.has(t.paramName) ? String(Math.round(t.sum)) : t.sum.toFixed(2);
    return `<tr><td class="qty-cat" colspan="2" style="text-align:right;">${escHtml(t.paramName)} 合計</td>`
      + `<td class="qty-value" style="font-weight:bold;">${valueText}</td><td class="qty-unit">${t.unit}</td></tr>`;
  }).join('');

  body.innerHTML = `
    <div class="prop-name">${ids.length}件選択中</div>
    <div class="prop-type">Shift+クリックで選択を追加・解除できます</div>
    <table class="qty-table" style="margin-top:8px;">
      <tbody>${rowsHtml}</tbody>
      ${totalsHtml ? `<tfoot>${totalsHtml}</tfoot>` : ''}
    </table>
  `;
}

function clearSelection() {
  selectedIds = new Set();
  if (currentModel) {
    ifcLoader.ifcManager.removeSubset(currentModel.modelID, highlightMaterial, 'ifc-viewer-highlight');
  }
  document.getElementById('panel').style.display = 'none';
  setActiveQtyGroup(null);
}

document.getElementById('closePanelBtn').addEventListener('click', clearSelection);

// ── 情報パネル描画 ───────────────────────────────────────
function fieldValue(v) {
  if (v == null) return '';
  if (typeof v === 'object' && 'value' in v) return String(v.value);
  return String(v);
}

async function showProperties(modelID, expressId) {
  const panel = document.getElementById('panel');
  const body = document.getElementById('panelBody');
  panel.style.display = 'flex';
  body.innerHTML = '<div class="panel-empty">読み込み中...</div>';

  let props, psets = [];
  try {
    props = await ifcLoader.ifcManager.getItemProperties(modelID, expressId, false);
  } catch (err) {
    body.innerHTML = `<div class="panel-empty">プロパティの取得に失敗しました<br>${err.message}</div>`;
    return;
  }
  try {
    psets = await ifcLoader.ifcManager.getPropertySets(modelID, expressId, true);
  } catch (err) {
    psets = [];
  }

  // 見出しの名称は分類ごとに使い分ける（buildQuantityTableのラベル決定ロジックと合わせる）:
  // 壁・スラブ・メッシュ・屋根・柱は「材質(全て)」、オブジェクト・ランプ・窓は「名称」、植栽は「樹木名称」
  const elementName = fieldValue(props.Name) || '';
  const globalId = fieldValue(props.GlobalId);
  const category = detectCategory(elementName);
  let name;
  if (category === '植栽') {
    name = readArchicadText(psets, '樹木名称') || elementName || `(ExpressID: ${expressId})`;
  } else if (category && FIXED_QTY_CATEGORIES.has(category)) {
    name = readArchicadText(psets, '名称') || readArchicadText(psets, '呼称')
      || readArchicadText(psets, 'ライブラリ部品名') || elementName || `(ExpressID: ${expressId})`;
  } else if (category) {
    name = readArchicadText(psets, '材質(全て)') || '(材質未設定)';
  } else {
    name = elementName || `(ExpressID: ${expressId})`;
  }

  const skipKeys = new Set(['expressID', 'Name', 'GlobalId', 'OwnerHistory', 'type', 'ObjectPlacement', 'Representation', 'Tag', 'PredefinedType']);
  const rows = Object.keys(props)
    .filter(k => !skipKeys.has(k))
    .map(k => {
      const v = props[k];
      if (v && typeof v === 'object' && !('value' in v)) return null; // 複雑な参照値は割愛
      const text = fieldValue(v);
      if (!text) return null;
      return `<tr><th>${escHtml(k)}</th><td>${escHtml(text)}</td></tr>`;
    })
    .filter(Boolean)
    .join('');

  // 価格系パラメータ（RIKCAD側の参考価格情報）は表示対象外にする（全角/半角表記ゆれをNFKC正規化して比較）
  const normKey = s => String(s).trim().normalize('NFKC');
  const HIDDEN_PSET_NAMES = new Set(['参考価格セット'].map(normKey));
  const HIDDEN_PROP_NAMES = new Set(['tanka', '小計', '参考価格(円)', '参考価格（円）'].map(normKey));
  // ArchiCADPropertiesは情報量が多いため、材質・要素ID・レイヤー・ライブラリ部品名のみ表示する
  const ARCHICAD_PSET_NAME = normKey('ArchiCADProperties');
  const ARCHICAD_ALLOWED_PROPS = new Set(['材質', '材質(全て)', '要素ID', 'レイヤー', 'ライブラリ部品名'].map(normKey));

  // AC_Pset_*（ライブラリ部品固有の情報。AC_Pset_RenovationAndPhasingは対象外）は
  // Difyの価格検索に渡すNAME・仕様値として収集する（画面表示はしない）。
  // 「名称」はDifyのNAMEに使う商品名そのものなのでSIYOU側には含めない。
  const difySpecs = [];
  let difyName = '';

  let psetsHtml = '';
  for (const pset of psets) {
    const psetName = fieldValue(pset.Name) || 'Property Set';
    if (HIDDEN_PSET_NAMES.has(normKey(psetName))) continue;
    const isArchicad = normKey(psetName) === ARCHICAD_PSET_NAME;
    const isAcSpecPset = psetName.startsWith('AC_Pset_') && psetName !== 'AC_Pset_RenovationAndPhasing';
    // IfcPropertySet は HasProperties(+NominalValue)、
    // IfcElementQuantity（面積・長さ等）は Quantities(+AreaValue/LengthValue/...) に値が入る
    const items = pset.HasProperties || pset.Quantities || [];
    const psetRows = items
      .map(p => {
        const pName = fieldValue(p.Name);
        if (!pName || HIDDEN_PROP_NAMES.has(normKey(pName))) return null;
        const pVal = fieldValue(
          p.NominalValue ?? p.AreaValue ?? p.LengthValue ?? p.VolumeValue
          ?? p.WeightValue ?? p.CountValue ?? p.TimeValue
        );
        if (isAcSpecPset && pVal) {
          if (!difyName && normKey(pName) === normKey('名称')) {
            difyName = pVal;
          } else {
            difySpecs.push(pVal);
          }
        }
        if (isArchicad && !ARCHICAD_ALLOWED_PROPS.has(normKey(pName))) return null;
        return `<tr><th>${escHtml(pName)}</th><td>${escHtml(pVal)}</td></tr>`;
      })
      .filter(Boolean)
      .join('');
    if (psetRows) {
      psetsHtml += `<div class="pset-title">${escHtml(psetName)}</div><table class="prop-table">${psetRows}</table>`;
    }
  }

  _currentDifyTarget = { expressId, name: difyName || name, siyouValues: difySpecs.slice(0, 20) };

  const hideLabel = hiddenIds.has(expressId) ? '👁 表示に戻す' : '🙈 一時的に非表示にする';
  body.innerHTML = `
    <div class="prop-name">${escHtml(name)}</div>
    <div class="prop-type">ExpressID: ${expressId}　${globalId ? 'GlobalId: ' + escHtml(globalId) : ''}</div>
    <button class="btn btn-secondary hide-toggle-btn" data-id="${expressId}" style="width:100%; margin-bottom:12px;">${hideLabel}</button>
    <button class="btn btn-primary dify-search-btn" style="width:100%; margin-bottom:12px;">💰 価格検索</button>
    <table class="prop-table">${rows}</table>
    ${psetsHtml}
  `;
}

document.getElementById('panelBody').addEventListener('click', async e => {
  if (e.target.closest('.dify-search-btn')) {
    openDifySearch();
    return;
  }
  const btn = e.target.closest('.hide-toggle-btn');
  if (!btn) return;
  const id = Number(btn.dataset.id);
  if (hiddenIds.has(id)) {
    hiddenIds.delete(id);
  } else {
    hiddenIds.add(id);
  }
  await applyHiddenIds();
  if (hiddenIds.has(id)) {
    clearSelection(); // 非表示にした要素は選択状態も解除する
  } else {
    btn.textContent = '🙈 一時的に非表示にする';
  }
});

// ── 価格検索（RIKCAD材料引き当て / Dify ワークフロー）─────────────
const difyModalOverlay = document.getElementById('difyModalOverlay');
const difyModalBody = document.getElementById('difyModalBody');
const difyTransferBtn = document.getElementById('difyTransferBtn');
let _difyLastResult = null; // 直近の検索結果（一覧表への転記用）

function closeDifyModal() {
  difyModalOverlay.classList.remove('show');
}
document.getElementById('difyModalCloseBtn').addEventListener('click', closeDifyModal);
document.getElementById('difyModalCancelBtn').addEventListener('click', closeDifyModal);

async function callDifyWorkflow(name, siyouValues) {
  const inputs = { NAME: name };
  siyouValues.forEach((v, i) => { inputs[`SIYOU${i + 1}`] = v; });
  const res = await fetch(`${DIFY_API_BASE}/workflows/run`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${DIFY_API_KEY}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ inputs, response_mode: 'blocking', user: 'ifc-viewer' }),
  });
  if (!res.ok) {
    const text = await res.text().catch(() => '');
    throw new Error(`Dify API エラー (${res.status}): ${text.slice(0, 200)}`);
  }
  const data = await res.json();
  const resultText = data?.data?.outputs?.result;
  if (!resultText) throw new Error('Difyからの応答に result が含まれていません');
  try {
    return JSON.parse(resultText);
  } catch (e) {
    throw new Error('Difyの応答をJSONとして解釈できませんでした: ' + resultText.slice(0, 200));
  }
}

async function openDifySearch() {
  if (!_currentDifyTarget) return;
  const target = _currentDifyTarget;
  difyTransferBtn.style.display = 'none';
  _difyLastResult = null;
  difyModalBody.innerHTML = `<div class="dify-status">「${escHtml(target.name)}」を検索中...</div>`;
  difyModalOverlay.classList.add('show');

  try {
    const parsed = await callDifyWorkflow(target.name, target.siyouValues);
    _difyLastResult = { target, parsed };
    renderDifyResult(parsed);
    // 数量一覧に該当行があれば「一覧表に転記」を出す
    const groupKey = idToGroupKeyMap.get(target.expressId);
    if (groupKey && groupKeyToRows.has(groupKey)) {
      difyTransferBtn.style.display = '';
    }
  } catch (err) {
    console.error(err);
    difyModalBody.innerHTML = `<div class="dify-status error">検索に失敗しました: ${escHtml(err.message)}</div>`;
  }
}

function renderDifyResult(parsed) {
  const items = Array.isArray(parsed.items) ? parsed.items : [];
  let html = '<div class="dify-result-meta">一致度: '
    + `<span class="${parsed.一致度 === '該当なし' ? 'tag-nohit' : ''}">${escHtml(parsed.一致度 || '-')}</span>`
    + (parsed.備考 ? ` ／ 備考: ${escHtml(parsed.備考)}` : '') + '</div>';
  if (items.length) {
    html += '<table class="dify-result-table"><thead><tr><th>部材名</th><th>商品名</th><th>仕様</th><th>単価</th><th>数量</th><th>小計</th></tr></thead><tbody>';
    for (const it of items) {
      html += `<tr><td>${escHtml(it.部材名 || '')}</td><td>${escHtml(it.商品名 || '')}</td><td>${escHtml(it.仕様 || '')}</td>`
        + `<td class="dify-num">${escHtml(String(it.単価 ?? ''))}</td><td class="dify-num">${escHtml(String(it.数量 ?? ''))}</td><td class="dify-num">${escHtml(String(it.小計 ?? ''))}</td></tr>`;
    }
    html += '</tbody>';
  }
  html += `<tfoot><tr><td colspan="5" style="text-align:right;font-weight:bold;">合計金額</td><td class="dify-num" style="font-weight:bold;">${escHtml(String(parsed.合計金額 ?? ''))}</td></tr></tfoot></table>`;
  difyModalBody.innerHTML = html;
}

difyTransferBtn.addEventListener('click', () => {
  if (!_difyLastResult) return;
  const { target, parsed } = _difyLastResult;
  const groupKey = idToGroupKeyMap.get(target.expressId);
  const qtyBodyEl = document.getElementById('qtyBody');
  const cell = groupKey && qtyBodyEl.querySelector(`.qty-price[data-group="${cssEscape(groupKey)}"]`);
  if (!cell) { alert('数量一覧に該当行が見つかりませんでした'); return; }
  const total = parsed?.合計金額;
  cell.textContent = (total !== undefined && total !== null && total !== '') ? `${total}円` : '-';
  cell.title = JSON.stringify(parsed.items || [], null, 1);
  closeDifyModal();
});

function cssEscape(s) {
  return String(s).replace(/["\\]/g, '\\$&');
}

function escHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ── 数量一覧パネル ───────────────────────────────────────
// RIKCAD/TapirのIFC出力ではIFCエンティティ型が壁・スラブ等で共通化されており
// （例: すべてIFCBUILDINGELEMENTPROXY）、IFC型では分類できない。
// 実際の分類情報は要素名（例:「壁-004」「スラブ-029」）の接頭辞に入っているため、
// 名称の接頭辞（末尾の「-番号」を除いた部分）で分類する。
const ALL_SCAN_TYPES = [
  IFCWALL, IFCWALLSTANDARDCASE, IFCSLAB, IFCREINFORCINGMESH, IFCROOF,
  IFCCOLUMN, IFCFURNISHINGELEMENT, IFCBUILDINGELEMENTPROXY, IFCRAMP, IFCWINDOW,
];
// 非表示機能用: 数量一覧の対象外（ドア・階段等）も含め広めにスキャンする
const HIDE_SCAN_TYPES = [
  ...ALL_SCAN_TYPES, IFCDOOR, IFCPLATE, IFCMEMBER, IFCCOVERING,
  IFCSTAIR, IFCSTAIRFLIGHT, IFCRAILING, IFCBEAM, IFCFOOTING,
];
const CATEGORY_NAMES = ['壁', 'スラブ', 'メッシュ', '屋根', '柱', 'オブジェクト', 'ランプ', '植栽', '窓'];
const CATEGORY_PARAMS = {
  '壁': ['高さ', '壁中心長さ', '表面積'],
  'スラブ': ['高さ', '平面図外周', '面積'],
  'メッシュ': ['平面図外周', '表面積'],
  '屋根': ['表面積'],
  '柱': ['躯体高さ/直径', '最大高さ'],
  'オブジェクト': ['数量', 'フェンス本体枚数', '枚数', 'フリー支柱'],
  'ランプ': ['数量'],
  '植栽': ['数量'],
  '窓': ['数量'],
};
// 数量は1決め打ち（＝名称でグルーピングし、同名要素の件数を積算する）
const FIXED_QTY_CATEGORIES = new Set(['オブジェクト', 'ランプ', '植栽', '窓']);
const UNIT_MAP = {
  '高さ': 'mm', '壁中心長さ': 'mm', '表面積': 'm²', '平面図外周': 'mm', '面積': 'm²',
  '躯体高さ/直径': 'mm', '最大高さ': 'mm', '数量': '個', 'フェンス本体枚数': '枚', '枚数': '枚', 'フリー支柱': '本',
};
const INT_PARAMS = new Set(['数量', 'フェンス本体枚数', '枚数', 'フリー支柱']);

// 「壁-004」→「壁」のように末尾の連番を除いた接頭辞を取り出し、対象分類か判定する
// RIKCADの出力では「ｽﾗﾌﾞ」「ﾒｯｼｭ」等、分類名が半角カナのことがあるためNFKCで正規化する
function detectCategory(name) {
  if (!name) return null;
  const normalized = name.trim().normalize('NFKC');
  const m = /^(.+?)[-－―ー]\d+$/.exec(normalized);
  const prefix = m ? m[1] : normalized;
  return CATEGORY_NAMES.includes(prefix) ? prefix : null;
}

let idToGroupKeyMap = new Map(); // expressId → "分類||expressId"（行グループの一意キー）
let groupKeyToRows = new Map();  // 上記キー → <tr>要素の配列
let groupKeyToMeta = new Map();  // 上記キー → { category, label, ids }

// プロパティ名の表記ゆれ（例:「ﾌｪﾝｽ本体枚数」のように一部だけ半角カナ）を吸収して比較する
function namesMatch(actualName, targetName) {
  return !!actualName && actualName.trim().normalize('NFKC') === targetName;
}

// PropertySet群から指定Pset名＋パラメータ名一致の値を取得（Pset/Quantity両対応）
// psetName未指定時は全Pset横断で検索する（数量系パラメータ用）
function readParamValue(psets, paramName, psetName) {
  for (const pset of psets) {
    if (psetName && fieldValue(pset.Name) !== psetName) continue;
    const items = pset.HasProperties || pset.Quantities || [];
    for (const p of items) {
      if (!namesMatch(fieldValue(p.Name), paramName)) continue;
      const raw = p.NominalValue ?? p.AreaValue ?? p.LengthValue ?? p.VolumeValue
        ?? p.WeightValue ?? p.CountValue ?? p.TimeValue;
      const num = parseFloat(fieldValue(raw));
      if (!Number.isNaN(num)) return num;
    }
  }
  return null;
}

// ArchiCADPropertiesパラメータ（材質(全て)／ライブラリ部品名など）を文字列として取得
// まずArchiCADProperties限定で探し、見つからない場合は念のため全Pset横断で探す
function readArchicadText(psets, paramName) {
  return findPropText(psets, paramName, 'ArchiCADProperties') || findPropText(psets, paramName, null);
}

function findPropText(psets, paramName, psetName) {
  for (const pset of psets) {
    if (psetName && fieldValue(pset.Name) !== psetName) continue;
    const items = pset.HasProperties || [];
    for (const p of items) {
      if (!namesMatch(fieldValue(p.Name), paramName)) continue;
      const text = fieldValue(p.NominalValue);
      if (text) return text;
    }
  }
  return null;
}

async function buildQuantityTable(modelID) {
  const qtyPanel = document.getElementById('qtyPanel');
  const qtyBody = document.getElementById('qtyBody');
  qtyPanel.classList.add('show');
  qtyBody.innerHTML = '<div class="qty-empty">数量を集計中...</div>';
  console.time('[数量一覧] 集計時間'); // 体感速度の切り分け用（ジオメトリ読込とは別に計測）

  // 表を作り直すとチェックボックスは未チェック状態になるため、青ハイライトも一緒にリセットする
  checkedIds.clear();
  await applyCheckedIds();

  idToGroupKeyMap = new Map();
  const manager = ifcLoader.ifcManager;

  // 1段目: getAllItemsOfType(..., verbose=true)でタイプごとに一括取得し、
  // 要素ごとに個別のgetItemProperties呼び出しをしない（WASM呼び出し回数を約半減）
  const targets = [];
  for (const t of ALL_SCAN_TYPES) {
    let items = [];
    try { items = await manager.getAllItemsOfType(modelID, t, true); } catch (err) { items = []; }
    for (const props of items) {
      const elementName = fieldValue(props.Name) || '';
      const category = detectCategory(elementName);
      if (category) targets.push({ id: props.expressID, elementName, category });
    }
  }

  // 2段目: 対象要素（対象9分類のみ）だけPropertySetsを並列取得して材質・名称と数量パラメータを組み立てる
  // （フェンス本体枚数等のライブラリ部品パラメータもインスタンス側Psetに直接ついているため
  //   タイプ側の追加取得は不要と実データで確認済み。呼び出し削減のため行わない）
  const rows = await Promise.all(targets.map(async ({ id, elementName, category }) => {
    let psets = [];
    try { psets = await manager.getPropertySets(modelID, id, true); } catch (err) { psets = []; }

    const fixedQty = FIXED_QTY_CATEGORIES.has(category);
    // 壁・スラブ・メッシュ・屋根・柱: ArchiCADProperties「材質(全て)」
    // オブジェクト・ランプ・窓: 「名称」or「呼称」、無ければ「ライブラリ部品名」
    // 植栽: 「樹木名称」
    let label;
    if (category === '植栽') {
      label = readArchicadText(psets, '樹木名称') || elementName || `ID${id}`;
    } else if (fixedQty) {
      label = readArchicadText(psets, '名称') || readArchicadText(psets, '呼称')
        || readArchicadText(psets, 'ライブラリ部品名') || elementName || `ID${id}`;
    } else {
      label = readArchicadText(psets, '材質(全て)') || '(材質未設定)';
    }

    const params = {};
    for (const paramName of CATEGORY_PARAMS[category]) {
      if (fixedQty && paramName === '数量') {
        params['数量'] = 1; // オブジェクト・ランプ・窓は要素1件＝数量1決め打ち
        continue;
      }
      const val = readParamValue(psets, paramName);
      if (val != null) params[paramName] = val;
    }

    return { id, category, label, params };
  }));

  const categoryRows = new Map(CATEGORY_NAMES.map(n => [n, []])); // 分類 → [{ id, label, params }]（要素1件＝1エントリ）
  for (const r of rows) {
    categoryRows.get(r.category).push({ id: r.id, label: r.label, params: r.params });
    idToGroupKeyMap.set(r.id, `${r.category}||${r.id}`);
  }

  const categoryResults = CATEGORY_NAMES.map(name => ({
    def: { name, params: CATEGORY_PARAMS[name] },
    rows: categoryRows.get(name),
  }));

  renderQuantityTable(categoryResults);
  console.timeEnd('[数量一覧] 集計時間');
}

function renderQuantityTable(categoryResults) {
  const qtyBody = document.getElementById('qtyBody');

  const prepared = categoryResults.map(({ def, rows }) => {
    const rowList = [];
    for (const r of rows) {
      const visibleParams = def.params.filter(p => r.params[p] != null);
      if (!visibleParams.length) continue;
      rowList.push({ id: r.id, label: r.label, visibleParams, params: r.params });
    }
    rowList.sort((a, b) => a.label.localeCompare(b.label, 'ja')); // 分類内は「材質・名称」の名称順
    return { def, rowList };
  }).filter(c => c.rowList.length);

  if (!prepared.length) {
    qtyBody.innerHTML = '<div class="qty-empty">数量データが見つかりませんでした</div>';
    return;
  }

  let html = '<table class="qty-table"><thead><tr>'
    + '<th style="width:26px;"></th><th>分類</th><th>材質・名称</th><th>項目</th><th>数量</th><th>単位</th><th>参考価格</th>'
    + '</tr></thead><tbody>';

  groupKeyToMeta = new Map();

  for (const { def, rowList } of prepared) {
    const catRowCount = rowList.reduce((sum, r) => sum + r.visibleParams.length, 0);
    let catFirst = true;

    for (const r of rowList) {
      const groupKey = `${def.name}||${r.id}`;
      groupKeyToMeta.set(groupKey, { category: def.name, label: r.label, ids: [r.id], params: r.params });
      let rowFirst = true;

      for (const paramName of r.visibleParams) {
        const value = r.params[paramName];
        const unit = UNIT_MAP[paramName] || '';
        const valueText = INT_PARAMS.has(paramName) ? String(Math.round(value)) : value.toFixed(2);

        const isFirstRow = rowFirst;
        html += `<tr class="qty-row" data-group="${escHtml(groupKey)}">`;
        if (rowFirst) {
          html += `<td class="qty-check" rowspan="${r.visibleParams.length}"><input type="checkbox" class="qty-select" data-group="${escHtml(groupKey)}" onclick="event.stopPropagation()"></td>`;
        }
        if (catFirst) {
          html += `<td class="qty-cat" rowspan="${catRowCount}">${escHtml(def.name)}</td>`;
          catFirst = false;
        }
        if (rowFirst) {
          html += `<td class="qty-group" rowspan="${r.visibleParams.length}">${escHtml(r.label)}</td>`;
          rowFirst = false;
        }
        html += `<td class="qty-param">${escHtml(paramName)}</td><td class="qty-value">${valueText}</td><td class="qty-unit">${unit}</td>`;
        if (isFirstRow) {
          html += `<td class="qty-price" rowspan="${r.visibleParams.length}" data-group="${escHtml(groupKey)}">-</td>`;
        }
        html += '</tr>';
      }
    }
  }

  html += '</tbody></table>';
  qtyBody.innerHTML = html;

  groupKeyToRows = new Map();
  qtyBody.querySelectorAll('tr.qty-row').forEach(tr => {
    const key = tr.dataset.group;
    if (!groupKeyToRows.has(key)) groupKeyToRows.set(key, []);
    groupKeyToRows.get(key).push(tr);
    tr.addEventListener('click', async (ev) => {
      const meta = groupKeyToMeta.get(key);
      if (!meta) return;
      if (ev.shiftKey || ev.ctrlKey || ev.metaKey) {
        // Shift/Ctrlクリックは3Dビューア側と同じく複数選択への追加/解除にする
        const allSelected = meta.ids.every(id => selectedIds.has(id));
        if (allSelected) meta.ids.forEach(id => selectedIds.delete(id));
        else meta.ids.forEach(id => selectedIds.add(id));
      } else {
        selectedIds = new Set(meta.ids);
      }
      await refreshSelectionUI();
    });
  });

  // チェック（拾い出しチェック用）: ONでIFC側を黄色に、OFFで色を外す（クリック選択の色とは独立）
  // 3Dビューアで複数選択中（Shift+クリック）にそのうちの1行をチェックした場合は、
  // 選択している要素すべてにチェックを反映する
  qtyBody.querySelectorAll('input.qty-select').forEach(cb => {
    cb.addEventListener('change', async () => {
      const meta = groupKeyToMeta.get(cb.dataset.group);
      if (!meta) return;
      const isPartOfMultiSelection = selectedIds.size > 1 && meta.ids.some(id => selectedIds.has(id));
      const targetIds = isPartOfMultiSelection ? Array.from(selectedIds) : meta.ids;
      for (const id of targetIds) {
        if (cb.checked) checkedIds.add(id); else checkedIds.delete(id);
      }
      await applyCheckedIds();
      if (isPartOfMultiSelection) {
        const targetIdSet = new Set(targetIds);
        qtyBody.querySelectorAll('input.qty-select').forEach(otherCb => {
          const otherMeta = groupKeyToMeta.get(otherCb.dataset.group);
          if (otherMeta && otherMeta.ids.some(id => targetIdSet.has(id))) {
            otherCb.checked = cb.checked;
          }
        });
      }
    });
  });
}

async function applyCheckedIds() {
  if (!currentModel) return;
  if (checkedIds.size === 0) {
    ifcLoader.ifcManager.removeSubset(currentModel.modelID, checkMaterial, 'ifc-viewer-checked');
    return;
  }
  const subset = ifcLoader.ifcManager.createSubset({
    scene,
    modelID: currentModel.modelID,
    ids: Array.from(checkedIds),
    removePrevious: true,
    material: checkMaterial,
    customID: 'ifc-viewer-checked',
  });
  if (subset) subset.renderOrder = 900; // クリック選択(999)より下にして、重なった場合はオレンジを優先表示
}

function setActiveQtyGroup(groupKey) {
  setActiveQtyGroups(groupKey ? [groupKey] : []);
}

// 3Dビューアで複数選択した場合に、一覧表側も対応する全行をまとめてアクティブ表示する
function setActiveQtyGroups(groupKeys) {
  document.querySelectorAll('#qtyBody tr.qty-row.active').forEach(tr => tr.classList.remove('active'));
  let firstRow = null;
  for (const key of (groupKeys || [])) {
    const rows = groupKeyToRows.get(key);
    if (!rows) continue;
    rows.forEach(tr => tr.classList.add('active'));
    if (!firstRow) firstRow = rows[0];
  }
  if (firstRow) firstRow.scrollIntoView({ block: 'nearest' });
}

// ── PDF重ね表示 ──────────────────────────────────────────
// PDFページをCanvasにラスタライズし、床面（水平面）に寝かせたテクスチャ板として表示する。
// pdfPivot（Group）が位置・高さ・回転・拡大率を担い、その子pdfPlaneMeshは
// 常にrotation.x=-90°で水平に固定する（Y軸回転と干渉させないための親子分離）。
const PT_TO_M = 0.0254 / 72; // PDFのポイント(1/72inch)をメートルに変換
const PDF_RENDER_SCALE = 2;  // ラスタライズ解像度倍率（表示の鮮明さ用。位置計算には使わない）
const DEFAULT_PDF_SCALE = 100; // 建築図面でよくある1:100縮尺を初期拡大率とする

let pdfDoc = null;
let pdfPageNum = 1;
let pdfPivot = null;      // 位置・高さ・回転・拡大率を持つGroup
let pdfPlaneMesh = null;  // PDF実体（ジオメトリ・テクスチャ）
let dxfMesh = null;       // DXF実体（LineSegments）
let _overlayType = '';    // 'pdf' | 'dxf'
let pdfEditMode = false;
let pdfDragging = false;
let pdfGroundY = 0; // 検出したモデルの接地面Y（「高さ」スライダーはこの値からの相対オフセット）
let pdfBaseX = 0, pdfBaseZ = 0; // X/Z移動の基準座標
const pdfDragOffset = new THREE.Vector3();

// IFCモデルの水平中心・接地面の高さを取得する（初回配置のアンカーに使う）
function getModelGroundAnchor() {
  if (!currentModel) return null;
  const box = new THREE.Box3().setFromObject(currentModel);
  if (box.isEmpty()) return null;
  const center = box.getCenter(new THREE.Vector3());
  return { x: center.x, y: box.min.y, z: center.z, spanX: box.max.x - box.min.x, spanZ: box.max.z - box.min.z };
}

const pdfEditToggle = document.getElementById('pdfEditToggle');

// page.render()がまれに応答しないまま固まるケースへの保険（一定時間で明示的にエラーにする）
function withTimeout(promise, ms, message) {
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error(message)), ms)),
  ]);
}

document.getElementById('pdfCloseBtn').addEventListener('click', () => pdfPanel.classList.remove('show'));
