async function renderPdfPage() {
  const page = await pdfDoc.getPage(pdfPageNum);
  const viewport = page.getViewport({ scale: PDF_RENDER_SCALE });
  const canvasEl = document.createElement('canvas');
  canvasEl.width = viewport.width;
  canvasEl.height = viewport.height;
  await withTimeout(
    page.render({ canvasContext: canvasEl.getContext('2d'), viewport }).promise,
    20000,
    'PDF描画がタイムアウトしました'
  );

  const widthM = (viewport.width / PDF_RENDER_SCALE) * PT_TO_M;
  const heightM = (viewport.height / PDF_RENDER_SCALE) * PT_TO_M;
  const texture = new THREE.CanvasTexture(canvasEl);

  if (pdfPlaneMesh) {
    pdfPlaneMesh.geometry.dispose();
    pdfPlaneMesh.geometry = new THREE.PlaneGeometry(widthM, heightM);
    pdfPlaneMesh.material.map.dispose();
    pdfPlaneMesh.material.map = texture;
    pdfPlaneMesh.material.needsUpdate = true;
  } else {
    const material = new THREE.MeshBasicMaterial({
      map: texture, transparent: true, opacity: parseFloat(pdfOpacityInput.value) / 100,
      side: THREE.DoubleSide, depthWrite: false,
    });
    pdfPlaneMesh = new THREE.Mesh(new THREE.PlaneGeometry(widthM, heightM), material);
    pdfPlaneMesh.rotation.x = -Math.PI / 2; // 常に水平（床面）に固定
    pdfPlaneMesh.renderOrder = 1;

    // 初回配置時はモデルの水平中心・接地面にアンカーする
    // （ワールド原点固定だとモデルの位置によっては画面外になり「表示されない」ことがあったため）
    // 拡大率は建築図面でよくある1:100縮尺を初期値とする（用紙の実寸1:1だとモデルに対して極端に小さいため）
    const anchor = getModelGroundAnchor();
    const initialScale = DEFAULT_PDF_SCALE;

    pdfGroundY = anchor ? anchor.y : 0;
    pdfScaleInput.value = initialScale;
    document.getElementById('pdfScaleVal').textContent = initialScale.toFixed(2);
    document.getElementById('pdfScaleHint').textContent = '(1:100縮尺=100)';

    pdfBaseX = anchor ? anchor.x : 0;
    pdfBaseZ = anchor ? anchor.z : 0;
    pdfOffsetXInput.value = 0; document.getElementById('pdfOffsetXVal').textContent = '0.0';
    pdfOffsetZInput.value = 0; document.getElementById('pdfOffsetZVal').textContent = '0.0';

    pdfPivot = new THREE.Group();
    pdfPivot.position.set(pdfBaseX, pdfGroundY + parseFloat(pdfHeightInput.value), pdfBaseZ);
    pdfPivot.rotation.y = THREE.MathUtils.degToRad(parseFloat(pdfRotInput.value));
    pdfPivot.scale.setScalar(initialScale);
    pdfPivot.add(pdfPlaneMesh);
    scene.add(pdfPivot);
    pdfVisibleToggle.checked = true;

    _overlayType = 'pdf';
    document.getElementById('overlayPanelTitle').textContent = '📄 PDF重ね表示';
  }
}

// ── DXF重ね表示 ──────────────────────────────────────────
// DXFファイルのエンコーディングを判定してデコード（Shift-JIS / UTF-8）
function decodeDxf(buffer) {
  const bytes = new Uint8Array(buffer);
  const probe = new TextDecoder('iso-8859-1').decode(bytes.subarray(0, Math.min(bytes.length, 2048)));
  // ヘッダーでShift-JIS(ANSI_932)指定を確認
  if (/ANSI_932/i.test(probe)) return new TextDecoder('shift-jis').decode(bytes);
  // UTF-8明示またはUnicode BOM
  if (/UNICODE|UTF-8/i.test(probe)) {
    try { return new TextDecoder('utf-8', { fatal: true }).decode(bytes); } catch {}
  }
  // デフォルト: UTF-8を試してダメならShift-JIS
  try { return new TextDecoder('utf-8', { fatal: true }).decode(bytes); } catch {}
  return new TextDecoder('shift-jis').decode(bytes);
}

function parseDxf(text) {
  // ペア配列を構築
  const raw = text.split(/\r?\n/);
  const pairs = [];
  for (let i = 0; i + 1 < raw.length; i += 2) {
    const code = parseInt(raw[i].trim(), 10);
    if (!isNaN(code)) pairs.push([code, raw[i + 1].trim()]);
  }

  // 単位変換係数
  const UNITS_TO_M = { 0: 1, 1: 0.0254, 2: 0.3048, 4: 0.001, 5: 0.01, 6: 1, 7: 1000 };
  let toM = 0.001;
  for (let i = 0; i < pairs.length - 1; i++) {
    if (pairs[i][0] === 9 && pairs[i][1] === '$INSUNITS') {
      toM = UNITS_TO_M[parseInt(pairs[i + 1][1], 10)] ?? 0.001;
      break;
    }
  }

  // ── エンティティ処理ヘルパー ────────────────────────────────
  // LINE/LWPOLYLINE/POLYLINE/ARC/CIRCLE/ELLIPSE/TEXT/MTEXT/INSERT を処理
  function collectEntity(type, ep, outSegs, outTexts, outInserts, ps) {
    if (type === 'LINE') {
      let x1 = 0, y1 = 0, x2 = 0, y2 = 0;
      for (const [c, v] of ep) {
        if (c === 10) x1 = parseFloat(v); else if (c === 20) y1 = parseFloat(v);
        else if (c === 11) x2 = parseFloat(v); else if (c === 21) y2 = parseFloat(v);
      }
      outSegs.push(x1, y1, x2, y2);
    } else if (type === 'LWPOLYLINE') {
      const pts = []; let closed = false;
      for (const [c, v] of ep) {
        if (c === 70) closed = !!(parseInt(v, 10) & 1);
        else if (c === 10) pts.push([parseFloat(v), 0]);
        else if (c === 20 && pts.length) pts[pts.length - 1][1] = parseFloat(v);
      }
      for (let j = 0; j < pts.length - 1; j++) outSegs.push(pts[j][0], pts[j][1], pts[j+1][0], pts[j+1][1]);
      if (closed && pts.length > 1) outSegs.push(pts[pts.length-1][0], pts[pts.length-1][1], pts[0][0], pts[0][1]);
    } else if (type === 'POLYLINE') {
      let closed = false;
      for (const [c, v] of ep) { if (c === 70) closed = !!(parseInt(v, 10) & 1); }
      ps.poly = { pts: [], closed };
    } else if (type === 'VERTEX') {
      if (ps.poly) {
        let x = 0, y = 0;
        for (const [c, v] of ep) {
          if (c === 10) x = parseFloat(v); else if (c === 20) y = parseFloat(v);
        }
        ps.poly.pts.push([x, y]);
      }
    } else if (type === 'SEQEND') {
      if (ps.poly && ps.poly.pts.length > 1) {
        const { pts, closed } = ps.poly;
        for (let j = 0; j < pts.length - 1; j++) outSegs.push(pts[j][0], pts[j][1], pts[j+1][0], pts[j+1][1]);
        if (closed) outSegs.push(pts[pts.length-1][0], pts[pts.length-1][1], pts[0][0], pts[0][1]);
      }
      ps.poly = null;
    } else if (type === 'ARC') {
      let cx = 0, cy = 0, r = 1, a1 = 0, a2 = 360;
      for (const [c, v] of ep) {
        if (c === 10) cx = parseFloat(v); else if (c === 20) cy = parseFloat(v);
        else if (c === 40) r = parseFloat(v);
        else if (c === 50) a1 = parseFloat(v); else if (c === 51) a2 = parseFloat(v);
      }
      const ra1 = a1 * Math.PI / 180;
      const ra2 = (a2 <= a1 ? a2 + 360 : a2) * Math.PI / 180;
      const steps = Math.max(8, Math.ceil((ra2 - ra1) * 16 / Math.PI));
      for (let s = 0; s < steps; s++) {
        const t1 = ra1 + (ra2 - ra1) * s / steps, t2 = ra1 + (ra2 - ra1) * (s + 1) / steps;
        outSegs.push(cx + r * Math.cos(t1), cy + r * Math.sin(t1), cx + r * Math.cos(t2), cy + r * Math.sin(t2));
      }
    } else if (type === 'CIRCLE') {
      let cx = 0, cy = 0, r = 1;
      for (const [c, v] of ep) {
        if (c === 10) cx = parseFloat(v); else if (c === 20) cy = parseFloat(v);
        else if (c === 40) r = parseFloat(v);
      }
      for (let s = 0; s < 32; s++) {
        const t1 = (s / 32) * Math.PI * 2, t2 = ((s + 1) / 32) * Math.PI * 2;
        outSegs.push(cx + r * Math.cos(t1), cy + r * Math.sin(t1), cx + r * Math.cos(t2), cy + r * Math.sin(t2));
      }
    } else if (type === 'ELLIPSE') {
      let cx = 0, cy = 0, mx = 1, my = 0, ratio = 1, p1 = 0, p2 = Math.PI * 2;
      for (const [c, v] of ep) {
        if (c === 10) cx = parseFloat(v); else if (c === 20) cy = parseFloat(v);
        else if (c === 11) mx = parseFloat(v); else if (c === 21) my = parseFloat(v);
        else if (c === 40) ratio = parseFloat(v);
        else if (c === 41) p1 = parseFloat(v); else if (c === 42) p2 = parseFloat(v);
      }
      const majorLen = Math.sqrt(mx * mx + my * my);
      const axisAngle = Math.atan2(my, mx);
      const minorLen = majorLen * ratio;
      const range = p2 > p1 ? p2 - p1 : p2 + Math.PI * 2 - p1;
      const steps = Math.max(16, Math.ceil(range * 16 / Math.PI));
      const cA = Math.cos(axisAngle), sA = Math.sin(axisAngle);
      for (let s = 0; s < steps; s++) {
        const t1 = p1 + range * s / steps, t2 = p1 + range * (s + 1) / steps;
        outSegs.push(
          cx + majorLen * Math.cos(t1) * cA - minorLen * Math.sin(t1) * sA,
          cy + majorLen * Math.cos(t1) * sA + minorLen * Math.sin(t1) * cA,
          cx + majorLen * Math.cos(t2) * cA - minorLen * Math.sin(t2) * sA,
          cy + majorLen * Math.cos(t2) * sA + minorLen * Math.sin(t2) * cA
        );
      }
    } else if (type === 'TEXT' || type === 'ATTDEF' || type === 'ATTRIB') {
      let x = 0, y = 0, h = 1, a = 0, str = '';
      for (const [c, v] of ep) {
        if (c === 10) x = parseFloat(v); else if (c === 20) y = parseFloat(v);
        else if (c === 40) h = parseFloat(v);
        else if (c === 50) a = parseFloat(v);
        else if (c === 1) str = v;
      }
      if (str.trim()) outTexts.push({ x, y, str: str.trim(), height: h, angle: a });
    } else if (type === 'MTEXT') {
      let x = 0, y = 0, h = 1, a = 0, str = '', extra = '';
      for (const [c, v] of ep) {
        if (c === 10) x = parseFloat(v); else if (c === 20) y = parseFloat(v);
        else if (c === 40) h = parseFloat(v);
        else if (c === 50) a = parseFloat(v);
        else if (c === 1) str = v;
        else if (c === 3) extra += v;
      }
      const cleaned = cleanMtext(extra + str);
      if (cleaned.trim()) outTexts.push({ x, y, str: cleaned.trim(), height: h, angle: a });
    } else if (type === 'INSERT') {
      let name = '', x = 0, y = 0, sx = 1, sy = 1, angle = 0;
      for (const [c, v] of ep) {
        if (c === 2) name = v;
        else if (c === 10) x = parseFloat(v); else if (c === 20) y = parseFloat(v);
        else if (c === 41) sx = parseFloat(v); else if (c === 42) sy = parseFloat(v);
        else if (c === 50) angle = parseFloat(v);
      }
      if (name) outInserts.push({ name, x, y, sx, sy, angle });
    } else if (type === 'LEADER') {
      // 引出線: 頂点(10/20の並び)をそのまま折れ線として描画
      const pts = [];
      for (const [c, v] of ep) {
        if (c === 10) pts.push([parseFloat(v), 0]);
        else if (c === 20 && pts.length) pts[pts.length - 1][1] = parseFloat(v);
      }
      for (let j = 0; j < pts.length - 1; j++) outSegs.push(pts[j][0], pts[j][1], pts[j+1][0], pts[j+1][1]);
    } else if (type === 'DIMENSION') {
      // 寸法線: 実体はグループコード2の無名ブロック(*D###)に格納済み（座標はWCS絶対値=ブロック基準点(0,0)基準）
      // INSERTと同じ展開経路に乗せるため、基準点なしの参照として登録する
      let name = '';
      for (const [c, v] of ep) { if (c === 2) name = v; }
      if (name) outInserts.push({ name, x: 0, y: 0, sx: 1, sy: 1, angle: 0 });
    }
  }

  // ── セクション走査ヘルパー ──────────────────────────────────
  function scanSection(sectionName, callback) {
    let inSec = false, i = 0;
    while (i < pairs.length) {
      const [code, val] = pairs[i];
      if (!inSec) {
        if (code === 2 && val === sectionName) { inSec = true; i++; continue; }
        i++; continue;
      }
      if (code === 0 && val === 'ENDSEC') break;
      if (code !== 0) { i++; continue; }
      const type = val; i++;
      const ep = [];
      while (i < pairs.length && pairs[i][0] !== 0) { ep.push(pairs[i]); i++; }
      callback(type, ep);
    }
  }

  // ── BLOCKSセクションをパース → ブロック定義マップ ──────────
  const blockDefs = new Map();
  let curBlock = null, curBlockName = '', ps = { poly: null };
  scanSection('BLOCKS', (type, ep) => {
    if (type === 'BLOCK') {
      let name = '', bx = 0, by = 0;
      for (const [c, v] of ep) {
        if (c === 2) name = v;
        else if (c === 10) bx = parseFloat(v);
        else if (c === 20) by = parseFloat(v);
      }
      curBlockName = name;
      // bx/by: ブロック基準点（WCS）。entity座標はWCS絶対値なので展開時に引く必要がある
      curBlock = { segs: [], texts: [], inserts: [], bx, by };
      ps = { poly: null };
    } else if (type === 'ENDBLK') {
      if (curBlockName) blockDefs.set(curBlockName, curBlock);
      curBlock = null; curBlockName = '';
    } else if (curBlock) {
      collectEntity(type, ep, curBlock.segs, curBlock.texts, curBlock.inserts, ps);
    }
  });

  // ── ENTITIESセクションをパース ──────────────────────────────
  const segs = [], texts = [], directInserts = [];
  ps = { poly: null };
  scanSection('ENTITIES', (type, ep) => {
    collectEntity(type, ep, segs, texts, directInserts, ps);
  });

  // ── INSERT展開（再帰・最大8段）──────────────────────────────
  // entity座標はWCS絶対値で格納されているため、block.bx/byを引いてからINSERT変換を適用する
  function expandInserts(inserts, depth) {
    if (depth > 8) return;
    for (const ins of inserts) {
      const block = blockDefs.get(ins.name);
      if (!block) continue;
      const rad = ins.angle * Math.PI / 180;
      const cosA = Math.cos(rad), sinA = Math.sin(rad);
      // ローカルオフセット（基準点を引く）してからスケール・回転・平行移動
      const tx = (ex, ey) => { const lx = ex - block.bx, ly = ey - block.by; return ins.x + lx * ins.sx * cosA - ly * ins.sy * sinA; };
      const ty = (ex, ey) => { const lx = ex - block.bx, ly = ey - block.by; return ins.y + lx * ins.sx * sinA + ly * ins.sy * cosA; };
      for (let j = 0; j + 3 < block.segs.length; j += 4) {
        segs.push(tx(block.segs[j], block.segs[j+1]), ty(block.segs[j], block.segs[j+1]),
                  tx(block.segs[j+2], block.segs[j+3]), ty(block.segs[j+2], block.segs[j+3]));
      }
      for (const t of block.texts) {
        texts.push({ x: tx(t.x, t.y), y: ty(t.x, t.y), str: t.str,
                     height: t.height * Math.max(Math.abs(ins.sx), Math.abs(ins.sy)),
                     angle: t.angle + ins.angle });
      }
      if (block.inserts.length) {
        expandInserts(block.inserts.map(ni => ({
          name: ni.name,
          x: tx(ni.x, ni.y), y: ty(ni.x, ni.y),
          sx: ins.sx * ni.sx, sy: ins.sy * ni.sy,
          angle: ins.angle + ni.angle,
        })), depth + 1);
      }
    }
  }
  expandInserts(directInserts, 0);

  return { segs, texts, toM };
}

// MTEXTの書式コード（\P改行・\H高さ等）を除去してプレーンテキストに変換
// \P（改行）と\p（段落プロパティ、例:\pxql;）は別物なので大文字小文字を区別する
function cleanMtext(s) {
  return s
    .replace(/\\P/g, '\n')
    .replace(/\\~/g, ' ')
    .replace(/\\\\/g, '\x00')
    .replace(/\\[A-Za-z][^;]*;/g, '')
    .replace(/[{}]/g, '')
    .replace(/\x00/g, '\\')
    .trim();
}

// テキストをSprite（カメラ常時正面向き）として生成
function makeTextSprite(str, x, y, toM) {
  const lines = str.split('\n').filter(Boolean);
  if (!lines.length) return null;
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const px = 32;
  ctx.font = `${px}px sans-serif`;
  const maxW = Math.max(...lines.map(l => ctx.measureText(l).width));
  canvas.width = Math.max(4, Math.ceil(maxW) + 8);
  canvas.height = Math.max(4, px * lines.length + 8);
  ctx.font = `${px}px sans-serif`;
  ctx.fillStyle = '#000000';
  lines.forEach((line, i) => ctx.fillText(line, 4, px * (i + 1)));
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  // DXF側の文字高さ・ブロック挿入倍率は要素ごとにバラつきが大きいため使わず、
  // スライダー値をそのまま全テキスト共通の世界座標上の高さ(m)として使う
  const aspect = canvas.width / canvas.height;
  const textScale = parseFloat(document.getElementById('dxfTextScale').value) || 1;
  sprite.userData.aspect = aspect;
  sprite.scale.set(textScale * aspect, textScale, 1);
  sprite.position.set(x * toM, 0.01, -(y * toM));
  sprite.renderOrder = 3;
  return sprite;
}

function buildDxfGroup(segs, texts, toM) {
  const group = new THREE.Group();
  const opacity = parseFloat(document.getElementById('pdfOpacity').value) / 100;

  // 線分
  if (segs.length >= 4) {
    const verts = [];
    for (let i = 0; i + 3 < segs.length; i += 4) {
      verts.push(segs[i] * toM, 0, -segs[i + 1] * toM);
      verts.push(segs[i + 2] * toM, 0, -segs[i + 3] * toM);
    }
    const geom = new THREE.BufferGeometry();
    geom.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
    const mat = new THREE.LineBasicMaterial({ color: 0x000000, transparent: true, opacity, depthTest: false });
    const lines = new THREE.LineSegments(geom, mat);
    lines.renderOrder = 2;
    group.add(lines);
  }

  // テキスト
  for (const t of texts) {
    const sprite = makeTextSprite(t.str, t.x, t.y, toM);
    if (sprite) { sprite.material.opacity = opacity; group.add(sprite); }
  }

  return group;
}

async function loadDxfOverlay(file) {
  if (pdfPivot) removePdf();
  const buf = await file.arrayBuffer();
  const text = decodeDxf(buf);
  const { segs, texts, toM } = parseDxf(text);
  if (!segs.length && !texts.length) throw new Error('図形データが見つかりませんでした');

  _overlayType = 'dxf';
  dxfMesh = buildDxfGroup(segs, texts, toM);

  const anchor = getModelGroundAnchor();
  pdfGroundY = anchor ? anchor.y : 0;

  pdfBaseX = 0; pdfBaseZ = 0;
  pdfOffsetXInput.value = 0; document.getElementById('pdfOffsetXVal').textContent = '0.0';
  pdfOffsetZInput.value = 0; document.getElementById('pdfOffsetZVal').textContent = '0.0';

  pdfScaleInput.value = 1;
  document.getElementById('pdfScaleVal').textContent = '1.000';
  document.getElementById('pdfScaleHint').textContent = '(DXF原寸=1.0)';

  pdfPivot = new THREE.Group();
  pdfPivot.position.set(0, pdfGroundY + parseFloat(pdfHeightInput.value), 0);
  pdfPivot.rotation.y = THREE.MathUtils.degToRad(parseFloat(pdfRotInput.value));
  pdfPivot.scale.setScalar(1);
  pdfPivot.add(dxfMesh);
  scene.add(pdfPivot);
  pdfVisibleToggle.checked = true;

  document.getElementById('overlayPanelTitle').textContent = '📐 DXF重ね表示';
  document.getElementById('pdfPageNav').style.display = 'none';
  pdfPanel.classList.add('show');
}

function removePdf() {
  if (pdfPivot) {
    scene.remove(pdfPivot);
    if (pdfPlaneMesh) {
      pdfPlaneMesh.geometry.dispose();
      if (pdfPlaneMesh.material.map) pdfPlaneMesh.material.map.dispose();
      pdfPlaneMesh.material.dispose();
    }
    if (dxfMesh) {
      dxfMesh.traverse(child => {
        if (child.geometry) child.geometry.dispose();
        if (child.material) {
          if (child.material.map) child.material.map.dispose();
          child.material.dispose();
        }
      });
    }
  }
  pdfPivot = null; pdfPlaneMesh = null; dxfMesh = null; _overlayType = '';
  pdfDoc = null;
  pdfVisibleToggle.checked = true;
  pdfEditMode = false;
  controls.enabled = true;
  pdfEditToggle.textContent = '🖐 位置調整モード: OFF';
  pdfEditToggle.classList.remove('active');
  pdfPanel.classList.remove('show');
  pdfLoadBtn.textContent = '📄 図面を重ねる';
}

// ── 一時非表示 ───────────────────────────────────────────
// モデル内の全expressIDを収集する（非表示以外のIDだけを集めたサブセットを作るため）
async function getAllModelIds(modelID) {
  if (allModelIdsCache) return allModelIdsCache;
  const manager = ifcLoader.ifcManager;
  const ids = new Set();
  for (const t of HIDE_SCAN_TYPES) {
    const items = await manager.getAllItemsOfType(modelID, t, false);
    for (const id of items) ids.add(id);
  }
  allModelIdsCache = ids;
  return ids;
}

// hiddenIdsの内容に合わせて表示を更新する
// （元モデルの一部だけを消す方法が無いため、非表示分を除いた複製サブセットに丸ごと差し替える）
async function applyHiddenIds() {
  if (!currentModel) return;
  const modelID = currentModel.modelID;

  if (visibleSubsetMesh) {
    scene.remove(visibleSubsetMesh);
    ifcLoader.ifcManager.removeSubset(modelID, undefined, 'ifc-viewer-visible');
    visibleSubsetMesh = null;
  }

  if (hiddenIds.size === 0) {
    currentModel.visible = true;
    showAllBtn.style.display = 'none';
    return;
  }

  const allIds = await getAllModelIds(modelID);
  const visibleIds = Array.from(allIds).filter(id => !hiddenIds.has(id));
  currentModel.visible = false;
  visibleSubsetMesh = ifcLoader.ifcManager.createSubset({
    scene,
    modelID,
    ids: visibleIds,
    removePrevious: true,
    customID: 'ifc-viewer-visible',
    // materialを指定しないことで、元の要素ごとの色・材質をそのまま維持する
  });
  showAllBtn.style.display = '';
}

showAllBtn.addEventListener('click', async () => {
  hiddenIds.clear();
  plantsHidden = false;
  plantHiddenIds.clear();
  hidePlantsToggle.textContent = '🌳 植栽を非表示';
  hidePlantsToggle.classList.remove('active');
  await applyHiddenIds();
  clearSelection();
});

// 名称接頭辞ベースの分類（detectCategory）が指定分類に一致する要素のexpressIDを集める
async function getCategoryElementIds(modelID, categoryName) {
  const manager = ifcLoader.ifcManager;
  const ids = new Set();
  for (const t of HIDE_SCAN_TYPES) {
    let items = [];
    try { items = await manager.getAllItemsOfType(modelID, t, true); } catch (err) { items = []; }
    for (const props of items) {
      const elementName = fieldValue(props.Name) || '';
      if (detectCategory(elementName) === categoryName) ids.add(props.expressID);
    }
  }
  return ids;
}

hidePlantsToggle.addEventListener('click', async () => {
  if (!currentModel) return;
  if (!plantsHidden) {
    const ids = await getCategoryElementIds(currentModel.modelID, '植栽');
    ids.forEach(id => { hiddenIds.add(id); plantHiddenIds.add(id); });
    plantsHidden = true;
    hidePlantsToggle.textContent = '🌳 植栽を表示に戻す';
    hidePlantsToggle.classList.add('active');
  } else {
    plantHiddenIds.forEach(id => hiddenIds.delete(id));
    plantHiddenIds.clear();
    plantsHidden = false;
    hidePlantsToggle.textContent = '🌳 植栽を非表示';
    hidePlantsToggle.classList.remove('active');
  }
  await applyHiddenIds();
  clearSelection();
});

// ── 距離計測 ─────────────────────────────────────────────
let measureMode = false;
let measurePoints = [];
let measureObjects = []; // 現在表示中のマーカー・線・ラベル（クリアの対象）
const measureMarkerMaterial = new THREE.MeshBasicMaterial({ color: 0x2266ff, depthTest: false });
const measureLineMaterial = new THREE.LineBasicMaterial({ color: 0x2266ff, depthTest: false });

// ── 計測結果のクリップボードコピー ─────────────────────
let measureToastTimer = null;
function showMeasureToast(text) {
  const el = document.getElementById('measureToast');
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(measureToastTimer);
  measureToastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// Clipboard APIが使えない環境（非HTTPS配信等）向けにtextarea+execCommandへフォールバックする
async function copyToClipboardText(text) {
  if (navigator.clipboard && window.isSecureContext) {
    try { await navigator.clipboard.writeText(text); return true; } catch (err) { /* フォールバックへ */ }
  }
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    return true;
  } catch (err) {
    return false;
  }
}

// displayText: トースト表示用（単位付き）、copyText: クリップボードにコピーする中身（数値のみ、Excel等の見積へ直接貼り付ける用途）
async function copyMeasureResult(displayText, copyText) {
  const ok = await copyToClipboardText(copyText);
  showMeasureToast(ok ? `${displayText} をコピーしました（数値のみ）` : `${displayText}（コピーに失敗しました）`);
}

measureToggle.addEventListener('click', () => {
  measureMode = !measureMode;
  if (measureMode && areaMeasureMode) {
    areaMeasureMode = false;
    areaMeasureToggle.textContent = '🟩 面積計測: OFF';
    areaMeasureToggle.classList.remove('active');
    clearAreaMeasurement();
  }
  measureToggle.textContent = `📏 距離計測: ${measureMode ? 'ON' : 'OFF'}`;
  measureToggle.classList.toggle('active', measureMode);
  if (!measureMode) clearMeasurement();
});

function handleMeasureClick(e) {
  if (!currentModel) return;
  const result = computeSnapCandidate(e);
  if (!result) return;

  if (measurePoints.length >= 2) clearMeasurement(); // 2点そろっていたら新しい計測をやり直す
  addMeasurePoint(result.point);
}

function addMeasurePoint(point) {
  measurePoints.push(point.clone());

  const marker = new THREE.Mesh(new THREE.SphereGeometry(0.06, 12, 12), measureMarkerMaterial);
  marker.position.copy(point);
  marker.renderOrder = 999;
  scene.add(marker);
  measureObjects.push(marker);

  if (measurePoints.length === 2) {
    const [a, b] = measurePoints;
    const lineGeom = new THREE.BufferGeometry().setFromPoints([a, b]);
    const line = new THREE.Line(lineGeom, measureLineMaterial);
    line.renderOrder = 999;
    scene.add(line);
    measureObjects.push(line);

    const dist = a.distanceTo(b);
    const distText = `${dist.toFixed(3)} m`;
    const label = makeDistanceLabel(distText);
    label.position.copy(a).add(b).multiplyScalar(0.5);
    label.position.y += 0.15;
    scene.add(label);
    measureObjects.push(label);
    copyMeasureResult(distText, dist.toFixed(3));
  }
}

function clearMeasurement() {
  measureObjects.forEach(obj => {
    scene.remove(obj);
    obj.geometry?.dispose?.();
    if (obj.material?.map) obj.material.map.dispose();
    obj.material?.dispose?.();
  });
  measureObjects = [];
  measurePoints = [];
}

// ── 面積計測 ─────────────────────────────────────────────
// クリックで多角形の頂点を追加し、始点付近を再クリックすると多角形を閉じて面積(m²)を表示する
let areaMeasureMode = false;
let areaPoints = [];
let areaClosed = false;
let areaObjects = []; // 現在表示中のマーカー・線・塗りつぶし・ラベル（クリアの対象）
const AREA_CLOSE_PIXEL_THRESHOLD = 20; // この画面上の距離(px)以内で始点をクリックすると多角形を閉じる
const areaMarkerMaterial = new THREE.MeshBasicMaterial({ color: 0x22aa55, depthTest: false });
const areaLineMaterial = new THREE.LineBasicMaterial({ color: 0x22aa55, depthTest: false });
const areaFillMaterial = new THREE.MeshBasicMaterial({
  color: 0x22aa55, transparent: true, opacity: 0.35, side: THREE.DoubleSide, depthTest: false,
});

areaMeasureToggle.addEventListener('click', () => {
  areaMeasureMode = !areaMeasureMode;
  if (areaMeasureMode && measureMode) {
    measureMode = false;
    measureToggle.textContent = '📏 距離計測: OFF';
    measureToggle.classList.remove('active');
    clearMeasurement();
  }
  areaMeasureToggle.textContent = `🟩 面積計測: ${areaMeasureMode ? 'ON' : 'OFF'}`;
  areaMeasureToggle.classList.toggle('active', areaMeasureMode);
  if (!areaMeasureMode) clearAreaMeasurement();
});

function handleAreaMeasureClick(e) {
  if (!currentModel) return;
  if (areaClosed) clearAreaMeasurement(); // 確定済みなら新しい多角形をやり直す

  const result = computeSnapCandidate(e);
  if (!result) return;

  if (areaPoints.length >= 3) {
    const rect = canvas.getBoundingClientRect();
    const firstScreen = worldToScreen(areaPoints[0], rect);
    const dx = (e.clientX - rect.left) - firstScreen.x;
    const dy = (e.clientY - rect.top) - firstScreen.y;
    if (Math.hypot(dx, dy) <= AREA_CLOSE_PIXEL_THRESHOLD) {
      closeAreaPolygon();
      return;
    }
  }
  addAreaPoint(result.point);
}

function addAreaPoint(point) {
  const prevLast = areaPoints.length ? areaPoints[areaPoints.length - 1] : null;
  areaPoints.push(point.clone());

  const marker = new THREE.Mesh(new THREE.SphereGeometry(0.06, 12, 12), areaMarkerMaterial);
  marker.position.copy(point);
  marker.renderOrder = 999;
  scene.add(marker);
  areaObjects.push(marker);

  if (prevLast) {
    const lineGeom = new THREE.BufferGeometry().setFromPoints([prevLast, point]);
    const line = new THREE.Line(lineGeom, areaLineMaterial);
    line.renderOrder = 999;
    scene.add(line);
    areaObjects.push(line);
  }
}

function closeAreaPolygon() {
  if (areaPoints.length < 3) return;

  const first = areaPoints[0], last = areaPoints[areaPoints.length - 1];
  const closeLineGeom = new THREE.BufferGeometry().setFromPoints([last, first]);
  const closeLine = new THREE.Line(closeLineGeom, areaLineMaterial);
  closeLine.renderOrder = 999;
  scene.add(closeLine);
  areaObjects.push(closeLine);

  try {
    const fillGeom = buildAreaFillMesh(areaPoints);
    if (fillGeom) {
      const fillMesh = new THREE.Mesh(fillGeom, areaFillMaterial);
      fillMesh.renderOrder = 998;
      scene.add(fillMesh);
      areaObjects.push(fillMesh);
    }
  } catch (err) {
    console.error('面積の塗りつぶし表示に失敗しました', err); // 数値の面積計算とは独立のため失敗しても計測自体は続行する
  }

  const area = polygonArea3D(areaPoints);
  const areaText = `${area.toFixed(3)} m²`;
  const centroid = areaPoints.reduce((acc, p) => acc.add(p), new THREE.Vector3()).multiplyScalar(1 / areaPoints.length);
  const label = makeDistanceLabel(areaText);
  label.position.copy(centroid);
  label.position.y += 0.15;
  scene.add(label);
  areaObjects.push(label);
  copyMeasureResult(areaText, area.toFixed(3));

  areaClosed = true;
}

function clearAreaMeasurement() {
  areaObjects.forEach(obj => {
    scene.remove(obj);
    obj.geometry?.dispose?.();
    if (obj.material?.map) obj.material.map.dispose();
    obj.material?.dispose?.();
  });
  areaObjects = [];
  areaPoints = [];
  areaClosed = false;
}

// Newellの方法: 平面多角形なら原点の取り方によらず成立する公式で面積を求める
// （厳密に同一平面上でなくても、頂点吸着による多少のずれ程度は実用上問題にならない）
function polygonArea3D(points) {
  if (points.length < 3) return 0;
  const sum = new THREE.Vector3();
  for (let i = 0; i < points.length; i++) {
    const a = points[i];
    const b = points[(i + 1) % points.length];
    sum.add(new THREE.Vector3().crossVectors(a, b));
  }
  return sum.length() / 2;
}

// 多角形を法線に垂直な平面へ投影し、THREE.Shapeで三角形分割して塗りつぶしメッシュを作る
// （頂点座標は変換せず直接ワールド座標で書き込むため、メッシュ自体はposition(0,0,0)のまま）
function buildAreaFillMesh(points) {
  const normal = new THREE.Vector3();
  for (let i = 0; i < points.length; i++) {
    const a = points[i], b = points[(i + 1) % points.length];
    normal.x += (a.y - b.y) * (a.z + b.z);
    normal.y += (a.z - b.z) * (a.x + b.x);
    normal.z += (a.x - b.x) * (a.y + b.y);
  }
  if (normal.lengthSq() < 1e-12) return null;
  normal.normalize();

  const origin = points[0];
  let u = null;
  for (let i = 1; i < points.length; i++) {
    const cand = new THREE.Vector3().subVectors(points[i], origin);
    if (cand.lengthSq() > 1e-10) { u = cand.normalize(); break; }
  }
  if (!u) return null;
  u.sub(normal.clone().multiplyScalar(u.dot(normal))).normalize();
  if (!isFinite(u.x) || !isFinite(u.y) || !isFinite(u.z)) return null;
  const v = new THREE.Vector3().crossVectors(normal, u).normalize();

  const shapePoints = points.map(p => {
    const rel = new THREE.Vector3().subVectors(p, origin);
    return new THREE.Vector2(rel.dot(u), rel.dot(v));
  });

  const geom = new THREE.ShapeGeometry(new THREE.Shape(shapePoints));
  const posAttr = geom.attributes.position;
  for (let i = 0; i < posAttr.count; i++) {
    const world = origin.clone()
      .add(u.clone().multiplyScalar(posAttr.getX(i)))
      .add(v.clone().multiplyScalar(posAttr.getY(i)));
    posAttr.setXYZ(i, world.x, world.y, world.z);
  }
  posAttr.needsUpdate = true;
  return geom;
}

// 距離ラベルを常にカメラを向くビルボード（Sprite）として作成する
function makeDistanceLabel(text) {
  const canvasEl = document.createElement('canvas');
  const ctx = canvasEl.getContext('2d');
  const fontSize = 48;
  ctx.font = `bold ${fontSize}px sans-serif`;
  const textWidth = ctx.measureText(text).width;
  canvasEl.width = textWidth + 32;
  canvasEl.height = fontSize + 24;
  // canvasのサイズ変更でコンテキストがリセットされるため再設定する
  ctx.font = `bold ${fontSize}px sans-serif`;
  ctx.fillStyle = 'rgba(20,40,80,0.85)';
  ctx.fillRect(0, 0, canvasEl.width, canvasEl.height);
  ctx.fillStyle = '#fff';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 16, canvasEl.height / 2);

  const texture = new THREE.CanvasTexture(canvasEl);
  const material = new THREE.SpriteMaterial({ map: texture, depthTest: false });
  const sprite = new THREE.Sprite(material);
  const worldHeight = 0.35;
  sprite.scale.set(worldHeight * (canvasEl.width / canvasEl.height), worldHeight, 1);
  sprite.renderOrder = 999;
  return sprite;
}

resize();

// 物件ファイル一覧（index.html）からの遷移用: ?url=... が指定されていれば自動取得して読み込む
// 物件フォルダ内にIFCと同名のDXFファイルがあれば、IFC読込に続けて自動で重ね表示する
async function loadSiblingDxfIfExists(ifcUrl) {
  const qIdx = ifcUrl.indexOf('?');
  const base = qIdx >= 0 ? ifcUrl.slice(0, qIdx) : ifcUrl;
  const query = qIdx >= 0 ? ifcUrl.slice(qIdx) : '';
  if (!/\.ifc$/i.test(base)) return;
  const dxfUrl = base.replace(/\.ifc$/i, '.dxf') + query;
  try {
    const res = await fetch(dxfUrl);
    if (!res.ok) return; // 同名DXFなし
    const buffer = await res.arrayBuffer();
    const name = decodeURIComponent(dxfUrl.split('/').pop().split('?')[0] || 'model.dxf');
    await loadDxfOverlay({ name, arrayBuffer: async () => buffer });
    pdfLoadBtn.textContent = '📄 図面設定';
  } catch (err) {
    console.warn('[同名DXF自動読込] スキップ:', err);
  }
}

(async function loadFromUrlParam() {
  const fileUrl = new URLSearchParams(location.search).get('url');
  if (!fileUrl) return;
  try {
    const res = await fetch(fileUrl);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const buffer = await res.arrayBuffer();
    const name = decodeURIComponent(fileUrl.split('/').pop().split('?')[0] || 'model.ifc');
    await loadFile({ name, arrayBuffer: async () => buffer });
    await loadSiblingDxfIfExists(fileUrl);
  } catch (err) {
    console.error('[loadFromUrlParam]', err);
    alert('IFCファイルの読み込みに失敗しました: ' + err.message);
  }
})();
