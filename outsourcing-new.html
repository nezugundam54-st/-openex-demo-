<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>外注費登録（発注なし）</title>
<style>
  html, body { margin: 0; padding: 0; background: #f4f5f6; }
  body { font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif; color: #333; min-height: 100vh; display: flex; flex-direction: column; }
  * { box-sizing: border-box; }
  a { color: #12a05e; text-decoration: none; }
  a:hover { color: #0c7a47; text-decoration: underline; }

  /* ===== ナビバー（index.html/outsourcing-edit.htmlと共通） ===== */
  .navbar { display: flex; align-items: stretch; height: 48px; padding: 0 4px; background: #fff; border-bottom: 1px solid #e0e0e0; flex: 0 0 auto; }
  .nav-main { display: flex; align-items: stretch; flex: 1; overflow-x: auto; }
  .nav-item {
    display: flex; align-items: center; gap: 5px;
    padding: 0 11px; font-size: 12px; color: #555;
    cursor: pointer; text-decoration: none; white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    background: none; border-top: none; border-left: none; border-right: none;
    font-family: inherit;
  }
  .nav-item:hover { color: #1a6fc4; }
  .nav-item.active { color: #1a6fc4; border-bottom-color: #1a6fc4; font-weight: 600; }
  .nav-item svg { flex-shrink: 0; width: 14px; height: 14px; }
  .nav-item.hacchukanri svg { color: #e53935; }
  .nav-right { display: flex; align-items: center; margin-left: auto; border-left: 1px solid #e8e8e8; padding-left: 2px; flex-shrink: 0; }

  /* ===== Top bar ===== */
  .topbar { background: #fff; display: flex; align-items: center; justify-content: flex-end; padding: 8px 20px 6px 20px; flex: 0 0 auto; }
  .topbar-inner { display: flex; align-items: center; gap: 24px; }
  .storage-info { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #555; }
  .user-info { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .user-avatar { width: 30px; height: 30px; border-radius: 50%; background: #e8eaec; display: flex; align-items: center; justify-content: center; }
  .user-name { font-size: 13px; font-weight: 600; color: #3a3a3a; white-space: nowrap; }

  /* ===== Page content ===== */
  .page-content { flex: 1; padding: 18px 60px 30px 60px; display: flex; flex-direction: column; gap: 14px; min-width: 0; }
  .breadcrumb { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .breadcrumb .sep { color: #8a9199; }
  .title-row { display: flex; align-items: center; gap: 14px; }
  .title-row h1 { margin: 0; font-size: 21px; font-weight: 700; color: #2f2f2f; flex: none; }
  .btn-green {
    display: flex; align-items: center; gap: 7px; background: #12a05e; color: #fff; border: none;
    border-radius: 5px; padding: 0 22px; height: 38px; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit; white-space: nowrap;
  }
  .btn-green:hover { background: #0e8a50; }
  .btn-outline-green {
    display: inline-flex; align-items: center; gap: 6px; background: #fff; color: #12a05e; border: 1px solid #12a05e;
    border-radius: 5px; padding: 9px 26px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .btn-outline-green:hover { background: #eefaf4; }

  /* ===== Card / table ===== */
  .card { background: #fff; border-radius: 6px; padding: 6px 14px 10px 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
  .note-box { background: #e9f3fb; color: #3a6b8a; font-size: 13px; padding: 10px 14px; border-radius: 5px; margin: 10px 0 4px 0; }
  .row-grid {
    display: grid;
    grid-template-columns: 30px minmax(160px,1.4fr) 90px 64px minmax(150px,1fr) minmax(150px,1fr) 150px 130px minmax(150px,1.2fr) 40px;
    align-items: center; gap: 6px;
  }
  .row-head { padding: 14px 4px 12px 4px; border-bottom: 1px dashed #c9ced3; }
  .row-head span { font-size: 13px; color: #8a9199; }
  .item-row { padding: 10px 4px; border-bottom: 1px dashed #dfe3e6; }
  .item-row input {
    width: 100%; height: 36px; border: 1px solid #c9ced3; border-radius: 5px; padding: 0 10px;
    font-size: 14px; font-family: inherit; color: #333; outline: none; background: #fff;
  }
  .item-row input:focus { border-color: #12a05e; }
  .item-row input.num { text-align: right; }
  .del-btn {
    width: 28px; height: 28px; border-radius: 50%; border: none; background: #f0f1f3; color: #9aa2a9;
    cursor: pointer; font-size: 16px; line-height: 1; display: flex; align-items: center; justify-content: center;
  }
  .del-btn:hover { background: #fce8e8; color: #e53935; }
  .add-row-bar { display: flex; justify-content: center; padding: 14px 0 6px 0; }
  .btn-add {
    display: flex; align-items: center; gap: 7px; background: #fff; color: #12a05e; border: 1px dashed #12a05e;
    border-radius: 5px; padding: 9px 20px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .btn-add:hover { background: #eefaf4; }
  .total-bar {
    display: flex; justify-content: flex-end; align-items: center; gap: 36px; padding: 16px 22px;
    border-bottom: 1px dashed #c9ced3; background: #fafcfb; margin: 14px -14px 0 -14px;
  }
  .total-item { display: flex; align-items: baseline; gap: 10px; }
  .total-label { font-size: 13px; color: #8a9199; }
  .total-val { font-size: 20px; font-weight: 700; color: #2f2f2f; }
  .back-bar { display: flex; justify-content: center; padding: 16px 0 10px 0; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #303133; color: #fff; padding: 8px 18px; border-radius: 4px; font-size: 12px;
    opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 300;
  }
  .toast.show { opacity: .92; }
</style>
</head>
<body>

<!-- ===== Top bar ===== -->
<div class="topbar">
  <div class="topbar-inner">
    <div class="storage-info">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#12a05e" stroke-width="1.4">
        <ellipse cx="8" cy="3.5" rx="5.5" ry="2.2"></ellipse>
        <path d="M2.5 3.5v4.5c0 1.2 2.5 2.2 5.5 2.2s5.5-1 5.5-2.2V3.5"></path>
        <path d="M2.5 8v4.5c0 1.2 2.5 2.2 5.5 2.2s5.5-1 5.5-2.2V8"></path>
      </svg>
      <span>容量状況：6.7GB/ 999.0TB (0.00%)</span>
    </div>
    <div class="user-info">
      <div class="user-avatar">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="#9aa2a9">
          <circle cx="9" cy="6" r="3.2"></circle>
          <path d="M2.5 16c.8-3.2 3.4-5 6.5-5s5.7 1.8 6.5 5z"></path>
        </svg>
      </div>
      <span class="user-name">可藤 なおき</span>
      <svg width="10" height="7" viewBox="0 0 10 7" fill="#666"><path d="M0 0h10L5 7z"></path></svg>
    </div>
  </div>
</div>

<!-- ===== ナビバー ===== -->
<nav class="navbar">
  <div class="nav-main">
    <button class="nav-item" data-nav="bukken">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      物件
    </button>
    <button class="nav-item" data-nav="kokyaku">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      顧客
    </button>
    <button class="nav-item" data-nav="file">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      ファイル検索
    </button>
    <button class="nav-item" data-nav="shared">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      共有物件
    </button>
    <button class="nav-item" data-nav="shodan">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      商談管理
    </button>
    <button class="nav-item" data-nav="estimate">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      見積管理
    </button>
    <button class="nav-item" data-nav="keiyaku">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><polyline points="9 15 11 17 15 13"/></svg>
      契約管理
    </button>
    <button class="nav-item hacchukanri" data-nav="hacchu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      発注管理
    </button>
    <button class="nav-item" data-nav="juchu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      受注管理
    </button>
    <button class="nav-item active" data-nav="outsourcing">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      外注費管理
    </button>
    <button class="nav-item" data-nav="schedule">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      スケジュール
    </button>
    <button class="nav-item" data-nav="chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      チャット
    </button>
    <button class="nav-item" data-nav="maker">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><polyline points="9 15 11 17 15 13"/></svg>
      メーカー見積
    </button>
    <button class="nav-item" data-nav="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      設定
    </button>
  </div>
  <div class="nav-right">
    <button class="nav-item" data-nav="manual">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      マニュアル
    </button>
  </div>
</nav>

<!-- ===== Page content ===== -->
<div class="page-content">

  <div class="breadcrumb">
    <a href="outsourcing-list.html" style="font-weight:700;">発注物件一覧</a>
    <span class="sep">&gt;</span>
    <span style="color:#333;">新規登録</span>
  </div>

  <div class="title-row">
    <h1>外注費登録（発注なし）</h1>
    <div style="display:flex; align-items:center; gap:12px; margin-left:auto;">
      <button class="btn-green" onclick="registerAll()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8.5l4 4L14 3.5"></path></svg>
        登録
      </button>
    </div>
  </div>

  <div class="card">
    <div class="note-box">発注管理に登録されていない請求（相見積り後の直接発注、材料費の実費精算など）をここから直接登録できます。</div>

    <div class="row-grid row-head">
      <span></span>
      <span>品名 / 仕様</span>
      <span style="text-align:right;">数量</span>
      <span style="text-align:center;">単位</span>
      <span>物件名</span>
      <span>発注先</span>
      <span style="text-align:right; padding-right:10px;">請求書金額</span>
      <span>処理月</span>
      <span>備考</span>
      <span></span>
    </div>

    <div id="rowsBody"></div>

    <div class="add-row-bar">
      <button class="btn-add" onclick="addRow()">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="#12a05e" stroke-width="2" stroke-linecap="round"><path d="M8 2v12M2 8h12"></path></svg>
        行を追加
      </button>
    </div>

    <div class="total-bar">
      <div class="total-item">
        <span class="total-label">請求書金額合計</span>
        <span class="total-val" id="totalInvoice">¥0</span>
      </div>
    </div>

    <div class="back-bar">
      <a class="btn-outline-green" href="outsourcing-list.html">戻る</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ===== ナビバー：index.htmlへの遷移（outsourcing-edit.htmlと同じ挙動） ===== */
function navClick(key) {
  sessionStorage.setItem('openex_nav_target', key);
  window.location.href = 'index.html';
}
document.addEventListener('click', function (e) {
  const btn = e.target.closest('.nav-item[data-nav]');
  if (!btn) return;
  if (btn.dataset.nav === 'outsourcing') {
    window.location.href = 'outsourcing-list.html';
  } else {
    navClick(btn.dataset.nav);
  }
});

/* ===== トースト ===== */
let _toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

/* ===== 明細行の管理（発注に紐づかない自由入力） ===== */
let rowSeq = 0;
let rows = [];

function newRow() {
  return { id: rowSeq++, name1: '', name2: '', qty: '', unit: '', property: '', vendor: '', amount: '', month: '', note: '' };
}

function addRow() {
  rows.push(newRow());
  renderRows();
}

function removeRow(id) {
  rows = rows.filter(r => r.id !== id);
  if (!rows.length) rows.push(newRow());
  renderRows();
  recalcTotal();
}

function onFieldChange(id, field, value) {
  const row = rows.find(r => r.id === id);
  if (!row) return;
  row[field] = value;
  if (field === 'amount') recalcTotal();
}

function esc(v) {
  return String(v ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function renderRows() {
  const body = document.getElementById('rowsBody');
  body.innerHTML = rows.map(r => `
    <div class="row-grid item-row">
      <span></span>
      <div style="display:flex; flex-direction:column; gap:4px;">
        <input type="text" placeholder="品名" value="${esc(r.name1)}" onchange="onFieldChange(${r.id},'name1',this.value)">
        <input type="text" placeholder="仕様" value="${esc(r.name2)}" onchange="onFieldChange(${r.id},'name2',this.value)">
      </div>
      <input type="text" class="num" value="${esc(r.qty)}" onchange="onFieldChange(${r.id},'qty',this.value)">
      <input type="text" style="text-align:center;" value="${esc(r.unit)}" onchange="onFieldChange(${r.id},'unit',this.value)">
      <input type="text" value="${esc(r.property)}" onchange="onFieldChange(${r.id},'property',this.value)">
      <input type="text" value="${esc(r.vendor)}" onchange="onFieldChange(${r.id},'vendor',this.value)">
      <input type="text" class="num" value="${esc(r.amount)}" onchange="onFieldChange(${r.id},'amount',this.value)">
      <input type="month" value="${esc(r.month)}" onchange="onFieldChange(${r.id},'month',this.value)">
      <input type="text" value="${esc(r.note)}" onchange="onFieldChange(${r.id},'note',this.value)">
      <button class="del-btn" onclick="removeRow(${r.id})" title="この行を削除">×</button>
    </div>
  `).join('');
}

function recalcTotal() {
  const total = rows.reduce((s, r) => {
    const n = parseInt(String(r.amount || '').replace(/[^0-9-]/g, ''), 10);
    return s + (isNaN(n) ? 0 : n);
  }, 0);
  document.getElementById('totalInvoice').textContent = '¥' + total.toLocaleString('ja-JP');
}

function registerAll() {
  const filled = rows.filter(r => r.name1.trim() || r.vendor.trim() || r.amount.trim());
  if (!filled.length) { toast('登録する行がありません'); return; }
  toast('この画面はデザインプロトタイプのため、登録機能は未実装です');
}

/* 初期表示: 空行を3行用意 */
rows = [newRow(), newRow(), newRow()];
renderRows();
recalcTotal();
</script>
</body>
</html>
