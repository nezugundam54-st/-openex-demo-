    "web-ifc": "https://unpkg.com/web-ifc@0.0.39/web-ifc-api.js",

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Helvetica Neue',Helvetica,'Hiragino Sans','Meiryo',Arial,sans-serif;
  font-size:12px;background:#f0f2f5;color:#303133;
  display:flex;flex-direction:column;height:100vh;overflow:hidden;
}

/* ===== ナビバー ===== */
.navbar {
  background: #fff; border-bottom: 1px solid #e0e0e0;
  display: flex; align-items: stretch; height: 48px; padding: 0 4px;
  flex: 0 0 auto;
}
.nav-main { display: flex; align-items: stretch; flex: 1; overflow-x: auto; }
.nav-item {
  display: flex; align-items: center; gap: 5px;
  padding: 0 11px; font-size: 12px; color: #555;
  cursor: pointer; text-decoration: none; white-space: nowrap;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  background: none; border-top: none; border-left: none; border-right: none;
  font-family: 'Noto Sans JP', 'Helvetica Neue', sans-serif;
}
.nav-item:hover { color: #1a6fc4; }
.nav-item.active { color: #1a6fc4; border-bottom-color: #1a6fc4; font-weight: 600; }
.nav-item svg { flex-shrink: 0; width: 14px; height: 14px; }
.nav-item.hacchukanri svg { color: #e53935; }
.nav-right {
  display: flex; align-items: center;
  margin-left: auto; border-left: 1px solid #e8e8e8; padding-left: 2px; flex-shrink: 0;
}

/* breadcrumb */
.breadcrumb-bar{background:#fff;padding:8px 16px;border-bottom:1px solid #e4e7ed;flex-shrink:0;font-size:13px;}
.breadcrumb-bar .crumb{color:#0d9488;cursor:pointer;}
.breadcrumb-bar .crumb.current{color:#606266;cursor:default;}
.breadcrumb-bar .sep{color:#c0c4cc;margin:0 6px;}

/* page header */
.page-header{background:#fff;padding:8px 16px 10px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #e4e7ed;flex-shrink:0;}
.page-title{font-size:19px;font-weight:bold;color:#303133;margin-right:4px;}
.info-btn{display:inline-flex;align-items:center;gap:5px;border:1px solid #dcdfe6;background:#fff;color:#303133;border-radius:16px;padding:5px 14px;font-size:12px;cursor:pointer;}
.info-btn .ic{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;background:#1d73cc;color:#fff;font-size:9px;font-style:normal;}

/* header bar */
.header-bar{background:#fff;border-bottom:1px solid #e4e7ed;padding:8px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;flex-shrink:0;}
.hf{display:flex;align-items:center;gap:6px;}
.hf-label{color:#606266;font-size:12px;white-space:nowrap;}
.hf-input{height:26px;line-height:26px;padding:0 8px;font-size:12px;border:1px solid #dcdfe6;border-radius:3px;background:#fff;color:#303133;}
.hf-input.ro{background:#f5f7fa;color:#606266;}
.hf-select{height:26px;line-height:26px;padding:0 22px 0 8px;font-size:12px;border:1px solid #dcdfe6;border-radius:3px;background:#fff;color:#303133;position:relative;display:inline-flex;align-items:center;}
.hf-select::after{content:'▾';position:absolute;right:7px;color:#c0c4cc;font-size:10px;}
.q-btn{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:50%;border:1px solid #c0c4cc;font-size:9px;color:#909399;cursor:pointer;flex-shrink:0;}
.zero-wrap{display:flex;align-items:center;gap:5px;}
.zero-wrap .cb{width:14px;height:14px;border:1px solid #c0c4cc;border-radius:2px;display:inline-block;}

/* summary cards */
.sum-cards{display:flex;gap:4px;margin-left:auto;}
.sum-card{border:1px solid #dbeafc;border-radius:4px;min-width:96px;overflow:hidden;background:#fff;}
.sum-head{background:#eaf4fd;color:#5b6b82;font-size:10px;padding:4px 8px;display:flex;align-items:center;justify-content:center;gap:3px;border-bottom:1px solid #dbeafc;white-space:nowrap;}
.sum-val{padding:5px 8px;text-align:right;font-size:14px;font-weight:bold;color:#2c3e50;}
.sum-card.emph .sum-val{color:#e02020;}

/* table scroll area */
.tbl-wrap{flex:1;overflow:auto;}

/* estimate table */
.etbl{border-collapse:collapse;min-width:1900px;width:100%;font-size:11px;table-layout:fixed;}
.etbl th,.etbl td{border:1px solid #d8dce5;padding:0;height:24px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* group header row */
.g-hd{background:#606266;color:#fff;text-align:center;font-weight:normal;font-size:10px;padding:4px 3px;border-right:1px solid #7d8087;}
.g-hd .minus{display:inline-block;width:11px;height:11px;line-height:9px;border:1px solid #9099a3;border-radius:2px;color:#dfe2e8;font-size:9px;margin-right:3px;}

/* sub header row */
.s-hd{background:#ecf0f6;color:#606266;text-align:center;font-size:10px;padding:3px;font-weight:bold;}

/* row types */
.r-sel td{background:#d6ecfb !important;}
.r-cat td{font-weight:bold;color:#303133;background:#fff;}
.r-sub td{background:#fff;color:#303133;}
.r-leaf td{background:#fff;color:#404040;}
.r-sum td{background:#f2f3f5;font-weight:bold;color:#303133;}
.r-sum-label td{background:#e9ebef;font-weight:bold;color:#404040;}
.r-total td{background:#c9d8ec;font-weight:bold;color:#1f2d3d;font-size:11.5px;}

/* alignment */
.ar{text-align:right;} .ac{text-align:center;} .al{text-align:left;}
.red-text{color:#e02020;}

/* hierarchy indent */
.name-wrap{display:flex;align-items:center;height:100%;gap:2px;}
.chev{display:inline-block;width:12px;color:#1d73cc;font-size:10px;cursor:pointer;user-select:none;flex-shrink:0;}
.chev.empty{visibility:hidden;}
.fic{flex-shrink:0;font-size:10px;}
.tree{color:#c0c4cc;font-size:10px;flex-shrink:0;}

/* cell inputs */
.cell-input{width:100%;height:100%;border:none;background:transparent;font:inherit;padding:2px 4px;color:#303133;}
.cell-input:focus{outline:2px solid #79bbff;background:#fff;}
.cell-input.ar{text-align:right;}
.cell-input.ac{text-align:center;}
.cell-input.al{text-align:left;}
.cell-input[readonly]{background:#fafafa;color:#606266;}
.cell-input.changed{color:#d9363e;font-weight:bold;}
.cell-input.bold{font-weight:bold;}

/* button bar */
.btn-bar{background:#f5f6f8;border-top:1px solid #e4e7ed;padding:10px 14px;display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0;align-items:center;}
.pbtn{height:30px;padding:0 16px;border-radius:15px;font-size:12px;font-weight:bold;cursor:pointer;border:1px solid #1d73cc;background:#f1faff;color:#1d73cc;}
.pbtn.primary{background:#1d73cc;color:#fff;border-color:#1d73cc;margin-left:auto;padding:0 26px;}
.sel-info{font-size:11px;color:#909399;}

/* modal / toast (操作メニュー) */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-box{background:#fff;min-width:200px;border-radius:4px;box-shadow:0 4px 24px rgba(0,0,0,.25);padding:6px 0;}
.modal-title{padding:8px 16px;font-weight:bold;border-bottom:1px solid #ebeef5;margin-bottom:4px;color:#1d73cc;font-size:12px;}
.modal-box button{display:block;width:100%;text-align:left;border:none;background:none;padding:8px 16px;font-size:12px;cursor:pointer;color:#303133;}
.modal-box button:hover{background:#f0f5fa;}
.modal-box hr{border:none;border-top:1px solid #ebeef5;margin:4px 0;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#303133;color:#fff;padding:8px 18px;border-radius:4px;font-size:12px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:300;}
.toast.show{opacity:.92;}

/* ─── CADから引用モーダル ─── */
.cad-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;align-items:center;justify-content:center;}
.cad-overlay.open{display:flex;}
.cad-modal{background:#fff;border-radius:6px;box-shadow:0 8px 32px rgba(0,0,0,.3);width:920px;max-width:95vw;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;}
.cad-header{padding:12px 16px;border-bottom:1px solid #e4e7ed;display:flex;align-items:center;flex-shrink:0;}
.cad-title{flex:1;font-size:14px;font-weight:bold;color:#303133;}
.cad-close{border:none;background:none;font-size:18px;cursor:pointer;color:#909399;padding:0 4px;line-height:1;}
.cad-close:hover{color:#303133;}
.cad-body{flex:1;overflow:auto;padding:12px 16px;}
.cad-footer{padding:10px 16px;border-top:1px solid #e4e7ed;display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;}
.cad-tbl{width:100%;border-collapse:collapse;font-size:12px;}
.cad-tbl th{background:#f5f7fa;border-bottom:2px solid #ddd;padding:6px 8px;text-align:left;white-space:nowrap;color:#555;font-weight:bold;}
.cad-tbl td{border-bottom:1px solid #eee;padding:5px 8px;vertical-align:middle;}
.cad-tbl tr:hover td{background:#fafbff;}
.cad-file-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid #ddd;border-radius:5px;margin-bottom:8px;cursor:pointer;}
.cad-file-item:hover{background:#f0f5ff;border-color:#4a7cc7;}
.koji-btn{padding:2px 8px;border:1px solid #1d73cc;background:#f1faff;color:#1d73cc;border-radius:3px;cursor:pointer;font-size:11px;font-family:inherit;font-weight:bold;}
.koji-btn:hover{background:#1d73cc;color:#fff;}

/* CADから引用: マスタのフォルダ階層＋フル内訳列プレビュー（export-src.dc.html準拠） */
#cadOverlay .cad-modal{width:1450px;max-width:97vw;}
/* 「CADから引用」直後の引用元選択画面（IFC/ビューア）はボタン2つだけなので小さく表示する */
#cadOverlay .cad-modal.cad-modal-compact{width:360px;}
.cad-import-tbl thead th{position:sticky;top:0;z-index:3;}
.cad-import-tbl thead tr:first-child th{top:0;}
.cad-import-tbl thead tr:last-child th{top:24px;}
/* 「定価」列までウィンドウ枠を横方向に固定（左端からの累積幅で位置指定） */
.stk-chk{position:sticky;left:0;z-index:2;}
.stk-koji{position:sticky;left:28px;z-index:2;}
.stk-chev{position:sticky;left:92px;z-index:2;}
.stk-name{position:sticky;left:116px;z-index:2;}
.stk-spec{position:sticky;left:316px;z-index:2;}
.stk-rikcad{position:sticky;left:386px;z-index:2;}
.stk-qty{position:sticky;left:536px;z-index:2;}
.stk-unit{position:sticky;left:591px;z-index:2;}
.stk-list{position:sticky;left:641px;z-index:2;border-right:2px solid #8f8f8f !important;}
/* モーダルフッターのボタンは.pbtn.primaryのmargin-left:autoを打ち消し、隣接配置にする */
.cad-footer .pbtn{margin-left:0;}

/* ─── カタログ検索（2026-07-17見積機能改修.pptx P.19/P.20準拠） ─── */
#catalogOverlay .cad-modal{width:900px;max-width:96vw;}
#catalogOverlay .cad-modal.catalog-modal-wide{width:1300px;max-width:97vw;}
.cat-toprow{display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap;padding-bottom:14px;margin-bottom:14px;border-bottom:1px solid #e4e7ed;}
.cat-field label{display:block;font-size:11px;color:#606266;margin-bottom:4px;}
.cat-field input, .cat-field select{height:28px;padding:0 8px;border:1px solid #dcdfe6;border-radius:4px;font-size:12px;font-family:inherit;}
.cat-range{display:flex;align-items:center;gap:6px;}
.cat-range input{width:90px;}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);column-gap:20px;row-gap:10px;margin-bottom:16px;}
.cat-grid .cat-field select{width:100%;}
.cat-grid .cat-field select:disabled{background:#f5f7fa;color:#c0c4cc;}
.cat-toggle{display:flex;align-items:center;gap:16px;justify-content:flex-end;margin-bottom:12px;font-size:12px;color:#303133;}
.cat-toggle label{display:flex;align-items:center;gap:5px;cursor:pointer;}
.cat-rate-bar{display:flex;gap:20px;align-items:flex-end;margin-bottom:10px;}
.cat-tbl{width:100%;border-collapse:collapse;font-size:12px;}
.cat-tbl th{background:#f5f7fa;border-bottom:2px solid #ddd;padding:6px 8px;text-align:left;white-space:nowrap;color:#555;font-weight:bold;position:sticky;top:0;}
.cat-tbl td{border-bottom:1px solid #eee;padding:5px 8px;vertical-align:middle;white-space:nowrap;}
.cat-tbl tr:hover td{background:#fafbff;}
.cat-tbl .cat-qty-input{width:56px;padding:2px 4px;border:1px solid #dcdfe6;border-radius:3px;font-size:12px;text-align:right;}
.cat-tbl .cat-unit-select{padding:2px 4px;border:1px solid #dcdfe6;border-radius:3px;font-size:12px;}
.cat-tbl-wrap{max-height:440px;overflow:auto;border:1px solid #eee;border-radius:4px;}
.cat-pagebar{display:flex;align-items:center;justify-content:center;gap:12px;padding:10px 0 2px;font-size:12px;color:#606266;}
.cat-pagebar button{border:1px solid #dcdfe6;background:#fff;border-radius:4px;width:26px;height:26px;cursor:pointer;}
.cat-pagebar button:disabled{opacity:.4;cursor:default;}

/* 工事選択サブモーダル（工事選択.dc.html準拠） */
.koji-lead{font-size:13px;color:#333;margin-bottom:12px;}
.koji-tbl-wrap{border:1px solid #d5d5d5;border-radius:3px;overflow-y:auto;max-height:378px;}
.koji-tbl{border-collapse:separate;border-spacing:0;table-layout:fixed;width:100%;font-size:13px;color:#222;}
.koji-tbl th{position:sticky;top:0;z-index:2;background:#f5f8fc;border-bottom:1px solid #d5d5d5;text-align:left;padding:6px 8px;font-weight:bold;color:#333;}
.koji-tbl td{border-bottom:1px solid #e3e3e3;padding:6px 8px;}
.koji-row{cursor:default;}
.koji-row-linked td{background:#eef4fc;}
.koji-master{font-size:11px;color:#666;}
.koji-rikcad{font-size:11px;color:#888;}
.koji-btn-cancel,.koji-btn-save{min-width:100px;padding:7px 22px;font-size:13px;font-weight:bold;border-radius:20px;cursor:pointer;font-family:inherit;}
.koji-btn-cancel{color:#2f6fd6;background:#fff;border:1px solid #2f6fd6;}
.koji-btn-cancel:hover{background:#eef4fc;}
.koji-btn-save{color:#fff;background:#2f6fd6;border:none;}
.koji-btn-save:hover{background:#245cb5;}
</style>
</head>

<!-- パンくず -->
<div class="breadcrumb-bar">
  <span class="crumb">見積管理</span><span class="sep">&gt;</span>
  <span class="crumb" id="bcProperty">—</span><span class="sep">&gt;</span>

</div>

<!-- ページタイトル + 情報ボタン -->
<div class="page-header">
  <div class="page-title">見積管理</div>
  <div class="info-btn"><i class="ic">ⓘ</i>物件情報</div>

</div>

/* ---------- state: 見積行ツリー ---------- */
let idSeq = 100;
const FIELD_DEFAULTS = {
  name: '', spec: '', qty: '', unitCode: '', listPrice: '',
  rate: '', cost: '', costAmount: '', costRate: '',
  craftsmanPrice: '', craftsmanAmount: '',
  bonePrice: '', boneAmount: '',
  unitPrice: '', amount: '',
  memo: '', interest: '', interestRate: '',
  orderWholesaleName: '', orderCraftsmanName: '',
  note: '',

function newFolder(name, children = []) {

let tree = [];

/* ---------- 計算式（estimate-edit.htmlのcalcRow/calcFromRate/calcFromPrice/calcFromCRate/calcFromPRateを再現） ----------
 * 掛率(rate) ⇔ 単価/提示価格(unitPrice) は 定価(listPrice) を介して連動。
 * 原価率(costRate) ・ 粗利率(interestRate) は「問屋材仕入れ(cost)＋職人手間(craftsmanPrice)＋骨材料等(bonePrice)」の
 * 合計（baseSum）を基準に unitPrice を逆算し、そこから掛率も追随する（estimate-master-replus.htmlと同じ考え方）。
 */
function recalcRow(row, changedField) {
  if (row.isMain) return;
  const qty  = Number(row.qty) || 0;
  const list = row.listPrice !== '' ? Number(row.listPrice) : NaN;
  const cost = row.cost !== '' ? Number(row.cost) : NaN;
  const craftsman = row.craftsmanPrice !== '' ? Number(row.craftsmanPrice) : NaN;
  const bone = row.bonePrice !== '' ? Number(row.bonePrice) : NaN;
  const hasAnyCost = row.cost !== '' || row.craftsmanPrice !== '' || row.bonePrice !== '';
  const baseSum = (isNaN(cost) ? 0 : cost) + (isNaN(craftsman) ? 0 : craftsman) + (isNaN(bone) ? 0 : bone);

  if (changedField === 'unitPrice') {
    if (!isNaN(list) && list > 0 && row.unitPrice !== '') {
      row.rate = (Number(row.unitPrice) / list * 100).toFixed(1);
    }
  } else if (changedField === 'costRate') {
    if (row.costRate !== '' && Number(row.costRate) !== 0) {
      row.unitPrice = Math.round(baseSum / (Number(row.costRate) / 100));
      if (!isNaN(list) && list > 0) row.rate = (Number(row.unitPrice) / list * 100).toFixed(1);
    }
  } else if (changedField === 'interestRate') {
    if (row.interestRate !== '' && Number(row.interestRate) < 100) {
      row.unitPrice = Math.round(baseSum / (1 - Number(row.interestRate) / 100));
      if (!isNaN(list) && list > 0) row.rate = (Number(row.unitPrice) / list * 100).toFixed(1);
    }
  } else {
    // 定価・掛率・数量・原価系(単価)などの変更 → 掛率×定価で単価(提示価格)を再計算
    if (!isNaN(list) && row.rate !== '') {
      row.unitPrice = Math.round(list * Number(row.rate) / 100);
    }
  }

  const uprice = row.unitPrice !== '' ? Number(row.unitPrice) : NaN;
  row.costAmount = !isNaN(cost) ? Math.round(qty * cost) : '';
  row.craftsmanAmount = !isNaN(craftsman) ? Math.round(qty * craftsman) : '';
  row.boneAmount = !isNaN(bone) ? Math.round(qty * bone) : '';
  row.amount = !isNaN(uprice) ? Math.round(qty * uprice) : '';
  const costTotalAmt = (row.costAmount === '' ? 0 : Number(row.costAmount))
    + (row.craftsmanAmount === '' ? 0 : Number(row.craftsmanAmount))
    + (row.boneAmount === '' ? 0 : Number(row.boneAmount));
  row.interest = (row.amount !== '') ? (Number(row.amount) - costTotalAmt) : '';

  if (changedField !== 'costRate') {
    row.costRate = (hasAnyCost && !isNaN(uprice) && uprice !== 0) ? (baseSum / uprice * 100).toFixed(1) : '';
  }
  if (changedField !== 'interestRate') {
    row.interestRate = (hasAnyCost && !isNaN(uprice) && uprice !== 0) ? ((uprice - baseSum) / uprice * 100).toFixed(1) : '';
  }
}
function recalcAll(nodes) { nodes.forEach(n => { recalcRow(n); if (n.children) recalcAll(n.children); }); }

/* 大項目(フォルダ)の集計: 原価合計・提示金額合計・粗利額・粗利率（都度計算・非保存） */
function aggregateAmounts(node) {
  if (!node.isMain) return;
  let costSum = 0, craftsmanSum = 0, boneSum = 0, amtSum = 0;
  (node.children || []).forEach(c => {
    aggregateAmounts(c);
    costSum += Number(c.costAmount) || 0;
    craftsmanSum += Number(c.craftsmanAmount) || 0;
    boneSum += Number(c.boneAmount) || 0;
    amtSum += Number(c.amount) || 0;
  });
  node.costAmount = costSum;
  node.craftsmanAmount = craftsmanSum;
  node.boneAmount = boneSum;
  node.amount = amtSum;
  node.interest = amtSum - (costSum + craftsmanSum + boneSum);
  node.interestRate = amtSum ? ((node.interest / amtSum) * 100).toFixed(1) : '';
}
function aggregateAll(nodes) { nodes.forEach(n => { if (n.isMain) aggregateAmounts(n); }); }
/* 総合計（問屋材仕入れ＋職人手間＋骨材料等＝原価合計、客出し金額＝総合計金額） */
function computeGrandTotal(nodes) {
  const t = nodes.reduce((s, n) => ({
    costOnly: s.costOnly + (Number(n.costAmount) || 0),
    craftsmanOnly: s.craftsmanOnly + (Number(n.craftsmanAmount) || 0),
    boneOnly: s.boneOnly + (Number(n.boneAmount) || 0),
    amt: s.amt + (Number(n.amount) || 0),
  }), { costOnly: 0, craftsmanOnly: 0, boneOnly: 0, amt: 0 });
  t.cost = t.costOnly + t.craftsmanOnly + t.boneOnly;
  return t;
}

const SNAPSHOT_FIELDS = Object.keys(FIELD_DEFAULTS);
function rebaseInit(nodes) {
  nodes.forEach(n => {
    const snap = {};
    SNAPSHOT_FIELDS.forEach(f => { snap[f] = n[f]; });
    n._init = snap;
    if (n.children) rebaseInit(n.children);
  });
}
function isChanged(row, field) { return String(row[field] ?? '') !== String(row._init?.[field] ?? ''); }

/* ---------- Supabase読み込み・保存 ---------- */
function genShortId() { return Math.random().toString(36).slice(2, 10); }

function rowToNode(r, isMain) {
  return {
    id: idSeq++, isMain, expanded: true, children: [],
    name: r.name || '', spec: r.spec || '',
    qty: r.qty != null ? String(r.qty) : '',
    unitCode: r.unit || '',
    listPrice: r.list_price != null ? String(r.list_price) : '',
    rate: r.rate != null ? String(r.rate) : '',
    cost: r.cost != null ? String(r.cost) : '',
    costAmount: '', costRate: '',
    craftsmanPrice: r.craftsman_unit_price != null ? String(r.craftsman_unit_price) : '',
    craftsmanAmount: '',
    bonePrice: r.bone_unit_price != null ? String(r.bone_unit_price) : '',
    boneAmount: '',
    unitPrice: r.unit_price != null ? String(r.unit_price) : '',
    amount: '',
    memo: r.memo || '',
    interest: '', interestRate: '',
    orderWholesaleName: r.order_wholesale_name || '',
    orderCraftsmanName: r.order_craftsman_name || '',
    note: r.note || '',
  };
}
function rowsToTree(rows) {
  const folderNodes = new Map();
  const folderParent = new Map();
  rows.filter(r => r.row_type !== 'row').forEach(r => {
    folderNodes.set(r.folder_id, rowToNode(r, true));
    folderParent.set(r.folder_id, r.parent_id);
  });
  const roots = [];
  folderNodes.forEach((node, folderId) => {
    const parentId = folderParent.get(folderId);
    if (parentId && folderNodes.has(parentId)) folderNodes.get(parentId).children.push(node);
    else roots.push(node);
  });
  rows.filter(r => r.row_type === 'row').forEach(r => {
    const node = rowToNode(r, false);
    if (r.parent_id && folderNodes.has(r.parent_id)) folderNodes.get(r.parent_id).children.push(node);
    else roots.push(node);
  });
  return roots;
}
function treeToRows(nodes, estimateIdVal, parentFolderId, level) {
  let out = [];
  nodes.forEach((n, idx) => {
    if (n.isMain) {
      const folderId = genShortId();
      out.push({
        estimate_id: estimateIdVal,
        row_type: parentFolderId ? 'subcat' : 'cat',
        name: n.name, spec: null, qty: null, unit: null,
        list_price: null, rate: null, unit_price: null, cost: null,
        craftsman_unit_price: null, bone_unit_price: null,
        order_wholesale_name: null, order_craftsman_name: null,
        memo: null, note: null,
        level, folder_id: folderId, parent_id: parentFolderId, sort_order: idx
      });
      out = out.concat(treeToRows(n.children, estimateIdVal, folderId, level + 1));
    } else {
      out.push({
        estimate_id: estimateIdVal,
        row_type: 'row',
        name: n.name,
        spec: n.spec || null,
        qty: n.qty !== '' ? Number(n.qty) : null,
        unit: n.unitCode || null,
        list_price: n.listPrice !== '' ? Number(n.listPrice) : null,
        rate: n.rate !== '' ? Number(n.rate) : null,
        unit_price: n.unitPrice !== '' ? Number(n.unitPrice) : null,
        cost: n.cost !== '' ? Number(n.cost) : null,
        craftsman_unit_price: n.craftsmanPrice !== '' ? Number(n.craftsmanPrice) : null,
        bone_unit_price: n.bonePrice !== '' ? Number(n.bonePrice) : null,
        order_wholesale_name: n.orderWholesaleName || null,
        order_craftsman_name: n.orderCraftsmanName || null,
        memo: n.memo || null,
        note: n.note || null,
        level, folder_id: null, parent_id: parentFolderId, sort_order: idx
      });
    }
  });
  return out;
}

async function loadFromSupabase() {
  try {
    if (estimateId) {
      const [er, rr] = await Promise.all([
        fetch(`${SB}/estimates?id=eq.${estimateId}`, { headers: H }),
        fetch(`${SB}/estimate_rows?estimate_id=eq.${estimateId}&order=sort_order.asc`, { headers: H }),
      ]);
      const ed = er.ok ? await er.json() : [];
      const est = ed[0];
      if (!est) {
        toast('見積データを取得できませんでした');
        tree = [newFolder('新規大項目')];
      } else {
        state.estNo = est.estimate_no || state.estNo;
        state.planName = est.plan_name || state.planName;
        document.getElementById('bcPlan').textContent = est.plan_name || est.estimate_no || '—';
        if (est.property_id) {
          fetch(`${SB}/properties?id=eq.${est.property_id}&select=name`, { headers: H })
            .then(r => r.json()).then(d => { if (d[0]) document.getElementById('bcProperty').textContent = d[0].name; })
            .catch(() => {});
        }
        const rows = rr.ok ? await rr.json() : [];
        tree = rows.length ? rowsToTree(rows) : [newFolder('新規大項目')];
      }
    } else {
      tree = [newFolder('新規大項目')];
      document.getElementById('bcPlan').textContent = state.planName || '新規見積（未保存）';
    }
  } catch (e) {
    toast('読み込みに失敗しました: ' + e.message);
    tree = [newFolder('新規大項目')];
  }
  recalcAll(tree);
  rebaseInit(tree);
  if (tree.length) {
    anchorId = tree[0].id;
    selectedIds = new Set(collectWithChildren(tree[0]).map(n => n.id));
  }
  document.getElementById('hfEstNo').value = state.estNo;
  document.getElementById('hfPlanName').value = state.planName;
  render();
}

async function saveToSupabase() {
  try {
    aggregateAll(tree);
    const grand = computeGrandTotal(tree);
    const payload = {
      estimate_no: state.estNo, plan_name: state.planName,
      property_id: baseParams.property_id, company_id: baseParams.company_id,
      koujiku: baseParams.koujiku, sales_staff_id: baseParams.sales_staff_id,
      total_amount: grand.amt, cost_amount: grand.cost,
      updated_at: new Date().toISOString(),
    };
    if (!estimateId) {
      const res = await fetch(`${SB}/estimates`, { method: 'POST', headers: { ...H, Prefer: 'return=representation' }, body: JSON.stringify(payload) });
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      estimateId = data[0].id;
      const newParams = new URLSearchParams(location.search);
      newParams.set('estimate_id', estimateId);
      history.replaceState(null, '', `?${newParams.toString()}`);
    } else {
      const res = await fetch(`${SB}/estimates?id=eq.${estimateId}`, { method: 'PATCH', headers: H, body: JSON.stringify(payload) });
      if (!res.ok) throw new Error(await res.text());
    }

    const rows = treeToRows(tree, estimateId, null, 1);
    const delRes = await fetch(`${SB}/estimate_rows?estimate_id=eq.${estimateId}`, { method: 'DELETE', headers: H });
    if (!delRes.ok) throw new Error(await delRes.text());
    if (rows.length) {
      const insRes = await fetch(`${SB}/estimate_rows`, { method: 'POST', headers: H, body: JSON.stringify(rows) });
      if (!insRes.ok) throw new Error(await insRes.text());
    }
    toast('保存しました');
    await loadFromSupabase();
  } catch (e) {
    toast('保存に失敗しました: ' + e.message);
  }
}

/* ---------- ヘルパー ---------- */
function findNode(nodes, id, parent = null) {
  for (const n of nodes) {
    if (n.id === id) return { node: n, parent, siblings: nodes };
    if (n.children && n.children.length) {
      const r = findNode(n.children, id, n);
      if (r) return r;
    }
  }
  return null;
}
function flattenTree(nodes) {
  let out = [];
  nodes.forEach(n => { out.push(n); if (n.children && n.children.length) out = out.concat(flattenTree(n.children)); });
  return out;
}
function collectWithChildren(node) {
  let out = [node];
  (node.children || []).forEach(c => { out = out.concat(collectWithChildren(c)); });
  return out;
}

/* ---------- 選択（クリック / Shift範囲 / Ctrl個別） ---------- */
let selectedIds = new Set();
let anchorId = null;
function onRowClick(id, ev) {
  const found = findNode(tree, id);
  if (!found) return;
  const node = found.node;
  const flat = flattenTree(tree);
  const curIdx = flat.findIndex(n => n.id === id);
  if (ev.shiftKey && anchorId != null) {
    const anchorIdx = flat.findIndex(n => n.id === anchorId);
    if (anchorIdx >= 0 && curIdx >= 0) {
      const lo = Math.min(anchorIdx, curIdx), hi = Math.max(anchorIdx, curIdx);
      selectedIds = new Set(flat.slice(lo, hi + 1).map(n => n.id));
    }
  } else if (ev.ctrlKey || ev.metaKey) {
    const group = collectWithChildren(node).map(n => n.id);
    if (selectedIds.has(id)) group.forEach(gid => selectedIds.delete(gid));
    else group.forEach(gid => selectedIds.add(gid));
    anchorId = id;
  } else {
    selectedIds = new Set(collectWithChildren(node).map(n => n.id));
    anchorId = id;
  }
  render();
}
function onToggleExpand(id, ev) {
  if (ev) ev.stopPropagation();
  const found = findNode(tree, id);
  if (!found) return;
  found.node.expanded = !found.node.expanded;
  render();
}
function onFieldChange(id, field, value) {
  const found = findNode(tree, id);
  if (!found) return;
  found.node[field] = value;
  recalcRow(found.node, field);
  render();
}

function addTopFolder() { tree.push(newFolder('新規大項目')); render(); }
function onRowAdd(id) {
  const found = findNode(tree, id);
  if (!found) return;
  const { node, siblings } = found;
  const targetList = node.isMain ? node.children : siblings;
  const insertAt = node.isMain ? targetList.length : targetList.indexOf(node) + 1;
  targetList.splice(insertAt, 0, newLeaf('新規行'));
  if (node.isMain) node.expanded = true;
  render();
}
function onHierarchyAdd(id) {
  const found = findNode(tree, id);
  if (!found) return;
  const { node } = found;
  if (!node.isMain) { toast('階層追加は大項目に対してのみ実行できます'); return; }
  node.children.push(newFolder('新規階層'));
  node.expanded = true;
  render();
}
function onBulkDelete() {
  if (selectedIds.size === 0) { toast('行が選択されていません'); return; }
  const selectedNodes = flattenTree(tree).filter(n => selectedIds.has(n.id));
  const hasFolder = selectedNodes.some(n => n.isMain);
  const msg = hasFolder
    ? '階層を削除すると、その階層に含まれる全ての行も一緒に削除されます。よろしいですか。'
    : '選択した行を削除します。よろしいですか？';
  if (!confirm(msg)) return;
  selectedIds.forEach(id => {
    const found = findNode(tree, id);
    if (found) { const idx = found.siblings.indexOf(found.node); if (idx > -1) found.siblings.splice(idx, 1); }
  });
  selectedIds = new Set();
  anchorId = tree.length ? tree[0].id : null;
  render();
}

function buildCell(row, field, cls, kind) {
  if (kind === 'amount') {
    const changed = isChanged(row, field) ? 'changed' : '';
    const boldCls = row.isMain ? 'bold' : '';
    return `<input class="cell-input ${cls} ${changed} ${boldCls}" readonly value="${esc(toThousands(row[field]))}" />`;
  }
  if (kind === 'rate-amount') {
    const raw = row[field];
    const display = raw === '' || raw === null || raw === undefined ? '' : raw + '%';
    const changed = isChanged(row, field) ? 'changed' : '';
    const boldCls = row.isMain ? 'bold' : '';
    return `<input class="cell-input ${cls} ${changed} ${boldCls}" readonly value="${esc(display)}" />`;
  }
  // 'edit'（大項目では常に空欄・編集不可）
  const disabled = row.isMain;
  const val = disabled ? '' : (row[field] ?? '');
  const changed = !disabled && isChanged(row, field) ? 'changed' : '';
  if (disabled) return `<input class="cell-input ${cls} ${changed}" readonly value="" />`;
  return `<input class="cell-input ${cls} ${changed}" value="${esc(val)}" onclick="event.stopPropagation()" onchange="onFieldChange(${row.id}, '${field}', this.value)" />`;

const STORAGE_BASE = 'https://ejxfofwavfypznjdwlpd.supabase.co/storage/v1/object/public/property-files';
let _cadPropertyId = '';
let _cadFiles      = [];   // property_files レコード
let _cadItems      = [];
let _cadAllMasterRows = []; // master_rows 全行（cat/subcat/row・価格列込み）
let _cadMasterItemMap = {}; // master_items.id -> name
let _cadPreviewLeaves = []; // renderCadImportTableで描画中のリーフ行（引用候補）一覧
let _kojiTargetIdx = -1;

function escHtml(v) {
  return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function cadSpec(item) {
  const params = item.parameters || '';
  if ([4,5,6,7].includes(item.type)) {
    const m = params.match(/ﾒｰｶｰ[：:]\s*([^\n\r、/]+)/);
    return m ? m[1].trim() : '';
  }
  return params;
}

function cadQtyDisplay(item) {
  const t = item.type, p = item.parameters || '';
  if (t === 4) {
    const mh = p.match(/塀高さ:([\d.]+)m/);
    const ma = p.match(/基準線面積:([\d.]+)㎡/);
    const ml = p.match(/基準線長さ:([\d.]+)m/);
    const parts = [];
    if (mh) parts.push(`塀高:${mh[1]}m`);
    if (ma) parts.push(`${ma[1]}㎡`);
    if (ml) parts.push(`${ml[1]}m`);
    return parts.join(' / ') || String(item.suuryo ?? 0);
  }
  if ([5,6,7].includes(t)) {
    const ma = p.match(/3D上面積:([\d.]+)㎡/);
    return ma ? `${ma[1]}㎡` : String(item.suuryo ?? 0);
  }
  return String(item.suuryo ?? 0);
}

function cadQtyUnit(item) {
  const t = item.type, p = item.parameters || '';
  if (t === 4) {
    const ml = p.match(/基準線長さ:([\d.]+)m/);
    const ma = p.match(/基準線面積:([\d.]+)㎡/);
    if (ml) return { qty: parseFloat(ml[1]), unit: 'm' };
    if (ma) return { qty: parseFloat(ma[1]), unit: '㎡' };
    return { qty: item.suuryo ?? 0, unit: 'm' };
  }
  if ([5,6,7].includes(t)) {
    const ma = p.match(/3D上面積:([\d.]+)㎡/);
    return { qty: ma ? parseFloat(ma[1]) : (item.suuryo ?? 0), unit: '㎡' };
  }
  return { qty: item.suuryo ?? 0, unit: '個' };
}

/* parametersの各行「ラベル:数値単位」を汎用的にパースして、取得可能な数量・単位をすべて行として返す
   （「ﾒｰｶｰ:xxx」のような数値で始まらない行はcadSpec側の情報なのでここでは無視する） */
function cadQtyRows(item) {
  const p = item.parameters || '';
  const rows = [];
  p.split(/\r?\n/).forEach(line => {
    const line2 = line.trim();
    if (!line2) return;
    const idx = line2.search(/[：:]/);
    if (idx < 0) return;
    const label = line2.slice(0, idx).trim();
    const rest = line2.slice(idx + 1).trim();
    const m = rest.match(/^([\d.]+)(.*)$/);
    if (!m) return;
    rows.push({ qty: parseFloat(m[1]), unit: m[2].trim(), label });
  });
  return rows.length ? rows : [{ qty: item.suuryo ?? 0, unit: '個', label: '' }];
}

function findAllMasterMatches(name) {
  const needle = (name || '').trim().toLowerCase();
  if (!needle) return [];
  return _cadAllMasterRows.filter(r => {
    if (r.row_type !== 'row' || !r.rikcad_name) return false;
    return r.rikcad_name.split(',').map(s => s.trim().toLowerCase()).includes(needle);
  });
}

/* 工事行(row)からparent_idを辿ってroot直下までのフォルダ(cat/subcat)行の配列を返す */
function getAncestorChain(row, allRows) {
  const folderByFolderId = new Map();
  allRows.forEach(r => { if (r.row_type !== 'row' && r.folder_id) folderByFolderId.set(r.folder_id, r); });
  const chain = [];
  const seen = new Set();
  let cur = row.parent_id ? folderByFolderId.get(row.parent_id) : null;
  while (cur && !seen.has(cur.folder_id)) {
    seen.add(cur.folder_id);
    chain.unshift(cur);
    cur = cur.parent_id ? folderByFolderId.get(cur.parent_id) : null;
  }
  return chain;
}

/* CAD引用データ(_cadItems)とマスタ行(全列)から、マスタのフォルダ階層でグループ化したプレビュー木を作る。
   1つのCAD要素に複数の工事がrikcad_nameで紐づいている場合は、マッチした行ごとに別リーフとして展開する。 */
function buildCadPreviewTree(cadItems, allMasterRows) {
  const folderByFolderId = new Map();
  allMasterRows.forEach(r => { if (r.row_type !== 'row' && r.folder_id) folderByFolderId.set(r.folder_id, r); });

  const folderNodeByFolderId = new Map();
  const roots = [];
  function ensureFolderNode(folderId) {
    if (folderNodeByFolderId.has(folderId)) return folderNodeByFolderId.get(folderId);
    const row = folderByFolderId.get(folderId);
    const node = { row, children: [], leaves: [] };
    folderNodeByFolderId.set(folderId, node);
    if (row.parent_id && folderByFolderId.has(row.parent_id)) {
      ensureFolderNode(row.parent_id).children.push(node);
    } else {
      roots.push(node);
    }
    return node;
  }

  const leaves = [];
  const looseLeaves = [];
  cadItems.forEach((item, itemIdx) => {
    const quRows = cadQtyRows(item);
    const matches = findAllMasterMatches(item.name);
    quRows.forEach((qu, subIdx) => {
      const base = { itemIdx, subIdx, qty: qu.qty, unit: qu.unit, qtyLabel: qu.label, cadName: item.name || '', spec: cadSpec(item) };
      if (matches.length === 0) {
        const leaf = { ...base, matchedRow: null };
        looseLeaves.push(leaf); leaves.push(leaf);
        return;
      }
      matches.forEach(m => {
        const leaf = { ...base, matchedRow: m };
        leaves.push(leaf);
        if (m.parent_id && folderByFolderId.has(m.parent_id)) {
          ensureFolderNode(m.parent_id).leaves.push(leaf);
        } else {
          looseLeaves.push(leaf);
        }
      });
    });
  });

  return { roots, looseLeaves, leaves };
}

/* マッチしたマスタ行の単価(cost/craftsman/bone/customer)から、CAD側の数量で見積もった金額・粗利をプレビュー計算する
   （import後にrecalcAllが行う計算と同じ式。単価⇔掛率等の逆算は行わず、金額の表示のみ） */
function cadPreviewAmounts(qty, m) {
  if (!m) return {};
  const cost = m.unit_price != null ? Number(m.unit_price) : NaN;
  const craftsman = m.craftsman_unit_price != null ? Number(m.craftsman_unit_price) : NaN;
  const bone = m.bone_unit_price != null ? Number(m.bone_unit_price) : NaN;
  const uprice = m.customer_unit_price != null ? Number(m.customer_unit_price) : NaN;
  const costAmount = !isNaN(cost) ? Math.round(qty * cost) : '';
  const craftsmanAmount = !isNaN(craftsman) ? Math.round(qty * craftsman) : '';
  const boneAmount = !isNaN(bone) ? Math.round(qty * bone) : '';
  const amount = !isNaN(uprice) ? Math.round(qty * uprice) : '';
  const costTotal = (costAmount === '' ? 0 : costAmount) + (craftsmanAmount === '' ? 0 : craftsmanAmount) + (boneAmount === '' ? 0 : boneAmount);
  const interest = amount !== '' ? (amount - costTotal) : '';
  const interestRate = (amount !== '' && amount !== 0) ? ((interest / amount) * 100).toFixed(1) : '';
  return { costAmount, craftsmanAmount, boneAmount, amount, interest, interestRate };
}

async function chooseCadSource(source) {
  const propertyId = _cadPropertyId;
  const body = document.getElementById('cadBody');
  const footer = document.getElementById('cadFooter');
  const isIfcSource = source === 'ifc';
  const sourceLabel = isIfcSource ? 'IFCから引用' : 'ビューアから引用';
  document.querySelector('#cadOverlay .cad-modal').classList.remove('cad-modal-compact');
  document.getElementById('cadTitle').textContent = sourceLabel;
  body.innerHTML = '<div style="padding:28px;text-align:center;color:#999;">読み込み中...</div>';
  footer.innerHTML = '';

  try {
    const r = await fetch(
      `${SB}/property_files?property_id=eq.${propertyId}&name=ilike.*.${isIfcSource ? 'ifc' : 'json'}&order=created_at.desc&limit=100`,
      { headers: H }
    );
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    _cadFiles = await r.json();
  } catch(e) {
    body.innerHTML = `<div style="padding:24px;color:#e02020;">ファイル一覧の取得に失敗しました: ${escHtml(e.message)}</div>`;
    footer.innerHTML = '<button class="pbtn" onclick="closeCadOverlay()">閉じる</button>';
    return;
  }

  if (_cadFiles.length === 0) {
    body.innerHTML = `<div style="padding:40px;text-align:center;color:#999;font-size:13px;">物件フォルダに${isIfcSource ? 'IFC' : 'JSON'}ファイルが見つかりませんでした</div>`;
    footer.innerHTML = '<button class="pbtn" onclick="renderCadSourceChoice()">戻る</button><button class="pbtn" onclick="closeCadOverlay()">キャンセル</button>';
    return;
  }

  if (_cadFiles.length === 1) {
    await loadCadFile(0);
  } else {
    renderFileSelect();
  }
}

function renderFileSelect() {
  let html = '<div style="margin-bottom:10px;font-size:12px;color:#606266;">複数のファイルが見つかりました。引用するファイルを選択してください。</div>';
  _cadFiles.forEach((f, i) => {
    const date = f.created_at ? f.created_at.slice(0,16).replace('T',' ') : '';
    const size = f.size ? `${(f.size/1024).toFixed(1)} KB` : '';
    const isIfc = (f.name || '').toLowerCase().endsWith('.ifc');
    html += `<div class="cad-file-item" onclick="loadCadFile(${i})">
      <span style="font-size:22px;line-height:1;">${isIfc ? '🧊' : '📄'}</span>
      <div style="flex:1;">
        <div style="font-weight:bold;font-size:12px;">${escHtml(f.name)}</div>
        <div style="color:#999;font-size:11px;">${date}${size ? ' · ' + size : ''}</div>
      </div>
    </div>`;
  });
  document.getElementById('cadBody').innerHTML = html;
  document.getElementById('cadFooter').innerHTML = '<button class="pbtn" onclick="closeCadOverlay()">キャンセル</button>';
}

async function loadCadFile(idx) {
  const f = _cadFiles[idx];
  const isIfc = (f.name || '').toLowerCase().endsWith('.ifc');
  document.getElementById('cadTitle').textContent = 'CADから引用';
  document.getElementById('cadBody').innerHTML = isIfc
    ? '<div style="padding:28px;text-align:center;color:#999;">IFCを解析中...（ファイルサイズによっては時間がかかります）</div>'
    : '<div style="padding:28px;text-align:center;color:#999;">読み込み中...</div>';
  document.getElementById('cadFooter').innerHTML = '';
  try {
    const r = await fetch(`${STORAGE_BASE}/${f.storage_path}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    if (isIfc) {
      // JSONルートとは別に、IFCを直接読んで同じフラット配列(file/suuryo/kakaku/name/type/parameters)を得る
      const buffer = await r.arrayBuffer();
      const { extractIfcItems } = await import('./ifc-extract.js');
      _cadItems = await extractIfcItems(buffer, f.name);
    } else {
      const text = await r.text();
      const cleaned = text.replace(/,\s*([}\]])/g, '$1');
      const data = JSON.parse(cleaned);
      _cadItems = data.items || (Array.isArray(data) ? data : []);
    }
    if (!_cadItems.length) throw new Error('データが空です');
    renderCadImportTable();
  } catch(e) {
    document.getElementById('cadBody').innerHTML = `<div style="padding:20px;color:#e02020;">読み込み失敗: ${escHtml(e.message)}</div>`;
    document.getElementById('cadFooter').innerHTML = '<button class="pbtn" onclick="closeCadOverlay()">閉じる</button>';
  }
}

async function saveKojiLinks() {
  if (_kojiTargetIdx < 0) return;
  const rikcadName = (_cadItems[_kojiTargetIdx]?.name || '').trim();
  const btn = document.getElementById('kojiSaveBtn');
  if (btn) { btn.disabled = true; btn.textContent = '保存中...'; }

  let errCount = 0;
  for (const chk of document.querySelectorAll('.koji-chk')) {
    const row = _cadAllMasterRows.find(r => String(r.id) === String(chk.dataset.rowId));
    if (!row) continue;
    const existing = (row.rikcad_name || '').split(',').map(s => s.trim()).filter(Boolean);
    const hasIt = existing.includes(rikcadName);
    let newList = [...existing];
    if (chk.checked && !hasIt) { newList.push(rikcadName); }
    else if (!chk.checked && hasIt) { newList = newList.filter(s => s !== rikcadName); }
    else { continue; }

    const newVal = newList.join(',');
    try {
      const res = await fetch(`${SB}/master_rows?id=eq.${row.id}`, {
        method: 'PATCH', headers: H, body: JSON.stringify({ rikcad_name: newVal })
      });
      if (res.ok) { row.rikcad_name = newVal; }
      else errCount++;
    } catch(e) { errCount++; }
  }

  closeKojiOverlay();
  toast(errCount > 0 ? `${errCount}件の保存に失敗しました` : '工事との紐づけを保存しました');
  renderCadImportTable();
}

function applyCadImport() {
  const checked = [...document.querySelectorAll('.cad-chk:checked')];
  if (!checked.length) { toast('行を選択してください'); return; }

  // node側フィールド(camelCase) ⇔ master_rows列(snake_case)の対応。
  // customer_unit_price(客出し単価)はcost_rateから独立して算出済みの値なので、
  // 後段でrecalcRow(n,'unitPrice')により明示的に再適用する（定価×掛率での上書きを防ぐ）。
  const FIELD_MAP = {
    listPrice: 'list_price', rate: 'rate', cost: 'unit_price',
    craftsmanPrice: 'craftsman_unit_price', bonePrice: 'bone_unit_price',
    costRate: 'cost_rate', unitPrice: 'customer_unit_price',
    orderWholesaleName: 'order_wholesale_name', orderCraftsmanName: 'order_craftsman_name',
    memo: 'line_remark',
  };

  const newNodes = [];
  const matchedPairs = [];
  for (const chk of checked) {
    const leaf = _cadPreviewLeaves[parseInt(chk.dataset.leafIdx)];
    if (!leaf) continue;
    const m = leaf.matchedRow;
    // マスタ未登録(m===null)の場合は、名称にCAD側のRIKCAD材料名をそのまま反映する
    const n = newLeaf(m ? (m.name || '') : (leaf.cadName || ''));
    n.spec = leaf.spec;
    n.qty = String(leaf.qty);
    n.unitCode = leaf.unit;
    n.note = leaf.cadName || '';
    if (m) {
      Object.entries(FIELD_MAP).forEach(([nodeField, dbField]) => {
        if (m[dbField] != null) n[nodeField] = String(m[dbField]);
      });
      if (m.customer_unit_price != null) matchedPairs.push({ node: n, customerPrice: String(m.customer_unit_price) });
    }
    newNodes.push(n);
  }
  if (!newNodes.length) { toast('挿入できる行がありません'); return; }

  let target = null;
  if (anchorId != null) {
    const found = findNode(tree, anchorId);
    if (found) target = found.node.isMain ? found.node : (found.parent || null);
  }
  if (!target) target = tree.find(n => n.isMain) || null;

  if (target) {
    newNodes.forEach(n => target.children.push(n));
    target.expanded = true;
  } else {
    newNodes.forEach(n => tree.push(n));
  }
  recalcAll(tree);
  matchedPairs.forEach(({ node, customerPrice }) => {
    node.unitPrice = customerPrice;
    recalcRow(node, 'unitPrice');
  });
  rebaseInit(tree); render();
  closeCadOverlay();
  toast(`${newNodes.length}行を追加しました`);
}

let _catalogAllItems = null;   // catalog_items 全件キャッシュ
let _catalogSearchSel = {};    // 検索フォームの現在の選択状態（maker/category/name/spec1-9/color1/color2）

let _catalogPage = 1;
const CATALOG_PAGE_SIZE = 50;
const CATALOG_FAV_KEY = 'catalogFavoriteIds';
const CATALOG_SPEC_FIELDS = ['spec1','spec2','spec3','spec4','spec5','spec6','spec7','spec8','spec9'];

function getCatalogFavorites() {
  try { return new Set(JSON.parse(localStorage.getItem(CATALOG_FAV_KEY) || '[]')); }
  catch(e) { return new Set(); }
}
function addCatalogFavorites(ids) {
  const fav = getCatalogFavorites();
  ids.forEach(id => fav.add(id));
  localStorage.setItem(CATALOG_FAV_KEY, JSON.stringify([...fav]));
}

async function loadCatalogItemsIfNeeded() {
  if (_catalogAllItems) return;
  const PAGE = 1000;
  let data = [], offset = 0;
  while (true) {
    const r = await fetch(`${SB}/catalog_items?order=category.asc,name.asc&limit=${PAGE}&offset=${offset}`, { headers: H });
    if (!r.ok) throw new Error(`catalog_items取得失敗 (HTTP ${r.status})`);
    const page = await r.json();
    data = data.concat(page);
    if (page.length < PAGE) break;
    offset += PAGE;
  }
  _catalogAllItems = data;
}

/* 現在の選択状態から、指定フィールド以外の条件だけで絞り込んだ候補一覧を返す
   （自分自身のフィールドで絞ると選択肢が1つに収束してしまうため、そのフィールドだけ除外する） */
function catalogCandidates(excludeField) {
  const fav = _catalogSearchSel.mode === 'favorite' ? getCatalogFavorites() : null;
  return _catalogAllItems.filter(it => {
    if (fav && !fav.has(it.id)) return false;
    if (excludeField !== 'maker' && _catalogSearchSel.maker && it.maker !== _catalogSearchSel.maker) return false;
    if (excludeField !== 'category' && _catalogSearchSel.category && it.category !== _catalogSearchSel.category) return false;
    if (excludeField !== 'name' && _catalogSearchSel.name && it.name !== _catalogSearchSel.name) return false;
    for (const f of CATALOG_SPEC_FIELDS) {
      if (excludeField !== f && _catalogSearchSel[f] && it[f] !== _catalogSearchSel[f]) return false;
    }
    if (excludeField !== 'color1' && _catalogSearchSel.color1 && it.color1 !== _catalogSearchSel.color1) return false;
    if (excludeField !== 'color2' && _catalogSearchSel.color2 && it.color2 !== _catalogSearchSel.color2) return false;
    return true;
  });
}

function catalogOptionsHtml(field, label) {
  const items = catalogCandidates(field);
  const values = [...new Set(items.map(it => it[field]).filter(Boolean))].sort();
  const current = _catalogSearchSel[field] || '';
  const disabled = values.length === 0 ? 'disabled' : '';
  let opts = `<option value="">${escHtml(label)}</option>`;
  opts += values.map(v => `<option value="${escHtml(v)}" ${v === current ? 'selected' : ''}>${escHtml(v)}</option>`).join('');
  return `<select ${disabled} onchange="onCatalogFieldChange('${field}', this.value)">${opts}</select>`;
}

function onCatalogFieldChange(field, value) {
  _catalogSearchSel[field] = value || '';
  renderCatalogSearchScreen();
}

function onCatalogModeChange(mode) {
  _catalogSearchSel.mode = mode;
  renderCatalogSearchScreen();
}

        <label>商品名検索</label>
        <input type="text" id="catNameSearch" style="width:100%;" placeholder="商品名で検索" value="${escHtml(s.nameSearch || '')}">
      </div>
      <div class="cat-field" style="flex:1.4;">
        <label>仕様検索</label>
        <input type="text" id="catSpecSearch" style="width:100%;" placeholder="仕様1〜9・カラーで検索" value="${escHtml(s.specSearch || '')}">
      </div>
      <div class="cat-field">
        <label>価格帯</label>
        <div class="cat-range">
          <input type="number" id="catPriceMin" placeholder="下限" value="${escHtml(s.priceMin ?? '')}">〜
          <input type="number" id="catPriceMax" placeholder="上限" value="${escHtml(s.priceMax ?? '')}">
        </div>
      </div>
      <button class="pbtn" onclick="runCatalogSearch()">検索</button>
    </div>

    <div class="cat-grid">
      <div class="cat-field"><label>メーカー</label>${catalogOptionsHtml('maker', 'すべて')}</div>
      <div class="cat-field"><label>商品カテゴリ</label>${catalogOptionsHtml('category', 'すべて')}</div>
      <div class="cat-field"><label>商品名</label>${catalogOptionsHtml('name', 'すべて')}</div>

      <div class="cat-field"><label>仕様1</label>${catalogOptionsHtml('spec1', '指定なし')}</div>
      <div class="cat-field"><label>仕様2</label>${catalogOptionsHtml('spec2', '指定なし')}</div>
      <div class="cat-field"><label>仕様3</label>${catalogOptionsHtml('spec3', '指定なし')}</div>

      <div class="cat-field"><label>仕様4</label>${catalogOptionsHtml('spec4', '指定なし')}</div>
      <div class="cat-field"><label>仕様5</label>${catalogOptionsHtml('spec5', '指定なし')}</div>
      <div class="cat-field"><label>仕様6</label>${catalogOptionsHtml('spec6', '指定なし')}</div>

      <div class="cat-field"><label>仕様7</label>${catalogOptionsHtml('spec7', '指定なし')}</div>
      <div class="cat-field"><label>仕様8</label>${catalogOptionsHtml('spec8', '指定なし')}</div>
      <div class="cat-field"><label>仕様9</label>${catalogOptionsHtml('spec9', '指定なし')}</div>

      <div class="cat-field"><label>カラー1</label>${catalogOptionsHtml('color1', '指定なし')}</div>
      <div class="cat-field"><label>カラー2</label>${catalogOptionsHtml('color2', '指定なし')}</div>
    </div>

    <div class="cat-toggle">
      <label><input type="radio" name="catMode" value="favorite" ${s.mode === 'favorite' ? 'checked' : ''} onchange="onCatalogModeChange('favorite')"> よく使う</label>
      <label><input type="radio" name="catMode" value="master" ${s.mode !== 'favorite' ? 'checked' : ''} onchange="onCatalogModeChange('master')"> 商品マスタ</label>
    </div>`;
  document.getElementById('catalogBody').innerHTML = html;
  document.getElementById('catalogFooter').innerHTML =
    '<button class="pbtn" onclick="closeCatalogOverlay()">閉じる</button>'
    + '<button class="pbtn primary" onclick="runCatalogSearch()">検索</button>';
}

function runCatalogSearch() {
  const s = _catalogSearchSel;
  s.nameSearch = document.getElementById('catNameSearch').value.trim();
  s.specSearch = document.getElementById('catSpecSearch').value.trim();
  s.priceMin = document.getElementById('catPriceMin').value;
  s.priceMax = document.getElementById('catPriceMax').value;

  let items = catalogCandidates(null); // メーカー/商品カテゴリ/商品名/仕様1-9/カラー1-2の選択条件（よく使う含む）

  if (s.nameSearch) {
    const words = s.nameSearch.toLowerCase().split(/\s+/).filter(Boolean);
    items = items.filter(it => {
      const text = [it.maker, it.category, it.name].filter(Boolean).join(' ').toLowerCase();
      return words.every(w => text.includes(w));
    });
  }
  if (s.specSearch) {
    const words = s.specSearch.toLowerCase().split(/\s+/).filter(Boolean);
    items = items.filter(it => {
      const text = [...CATALOG_SPEC_FIELDS.map(f => it[f]), it.color1, it.color2].filter(Boolean).join(' ').toLowerCase();
      return words.every(w => text.includes(w));
    });
  }
  const min = s.priceMin !== '' ? Number(s.priceMin) : null;
  const max = s.priceMax !== '' ? Number(s.priceMax) : null;
  if (min != null) items = items.filter(it => it.list_price != null && Number(it.list_price) >= min);
  if (max != null) items = items.filter(it => it.list_price != null && Number(it.list_price) <= max);

  _catalogResults = items;
  _catalogPage = 1;
  document.querySelector('#catalogOverlay .cad-modal').classList.add('catalog-modal-wide');
  document.getElementById('catalogTitle').textContent = '検索商品画面';
  renderCatalogResultsScreen();
}

function _catalogRowState(id) {
  if (!_catalogRowStateMap.has(id)) _catalogRowStateMap.set(id, { qty: '1', unit: '' });
  return _catalogRowStateMap.get(id);
}
let _catalogRowStateMap = new Map();

function renderCatalogResultsScreen() {
  const total = _catalogResults.length;
  const pageCount = Math.max(1, Math.ceil(total / CATALOG_PAGE_SIZE));
  _catalogPage = Math.min(Math.max(1, _catalogPage), pageCount);
  const start = (_catalogPage - 1) * CATALOG_PAGE_SIZE;
  const pageItems = _catalogResults.slice(start, start + CATALOG_PAGE_SIZE);

  const rowsHtml = pageItems.length ? pageItems.map(it => {
    const st = _catalogRowState(it.id);
    if (!st.unit) st.unit = it.unit || '式';
    return `<tr>
      <td class="center"><input type="checkbox" class="cat-chk" data-id="${it.id}"></td>
      <td>${escHtml(it.maker || '')}</td>
      <td>${escHtml(it.category || '')}</td>
      <td>${escHtml(it.name || '')}</td>
      <td class="right"><input class="cat-qty-input" value="${escHtml(st.qty)}" onchange="_catalogRowState(${it.id}).qty=this.value"></td>
      <td><select class="cat-unit-select" onchange="_catalogRowState(${it.id}).unit=this.value">
        ${['式','個','本','枚','m','m²','㎡','set'].map(u => `<option value="${u}" ${u === st.unit ? 'selected' : ''}>${u}</option>`).join('')}
      </select></td>
      <td>${escHtml(it.spec1 || '')}</td>
      <td>${escHtml(it.spec2 || '')}</td>
      <td>${escHtml(it.spec3 || '')}</td>
    </tr>`;
  }).join('') : '<tr><td colspan="9" style="text-align:center;color:#999;padding:32px;">該当する商品がありません</td></tr>';

  const html = `
    <div class="cat-rate-bar">
      <div class="cat-field"><label>掛率</label><input type="number" id="catRate" placeholder="未入力=100%" style="width:100px;"> %</div>
      <div class="cat-field"><label>原価率</label><input type="number" id="catCostRate" style="width:100px;"> %</div>
    </div>
    <div class="cat-tbl-wrap">
      <table class="cat-tbl">
        <thead><tr>
          <th style="width:36px;">選択</th><th>メーカー</th><th>商品カテゴリ</th><th>商品名</th>
          <th>数量</th><th>単位</th><th>仕様1</th><th>仕様2</th><th>仕様3</th>
        </tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>
    </div>
    <div class="cat-pagebar">
      <button onclick="catalogChangePage(-1)" ${_catalogPage <= 1 ? 'disabled' : ''}>‹</button>
      <span>${_catalogPage}</span>
      <button onclick="catalogChangePage(1)" ${_catalogPage >= pageCount ? 'disabled' : ''}>›</button>
      <span>${total}件中 ${total ? start + 1 : 0}〜${Math.min(start + CATALOG_PAGE_SIZE, total)}件</span>
    </div>`;
  document.getElementById('catalogBody').innerHTML = html;
  document.getElementById('catalogFooter').innerHTML =
    '<button class="pbtn" onclick="renderCatalogSearchScreen();document.querySelector(\'#catalogOverlay .cad-modal\').classList.remove(\'catalog-modal-wide\');document.getElementById(\'catalogTitle\').textContent=\'カタログ検索\';">検索条件に戻る</button>'
    + '<button class="pbtn" onclick="registerCatalogFavorites()">「よく使う」に登録</button>'
    + '<button class="pbtn primary" onclick="applyCatalogImport()">引用</button>'
    + '<button class="pbtn" onclick="closeCatalogOverlay()">閉じる</button>';
}

function catalogChangePage(delta) {
  _catalogPage += delta;
  renderCatalogResultsScreen();
}

function _catalogCheckedIds() {
  return [...document.querySelectorAll('.cat-chk:checked')].map(chk => Number(chk.dataset.id));
}

function registerCatalogFavorites() {
  const ids = _catalogCheckedIds();
  if (!ids.length) { toast('行を選択してください'); return; }
  addCatalogFavorites(ids);
  toast(`${ids.length}件を「よく使う」に登録しました`);
}

function applyCatalogImport() {
  const ids = _catalogCheckedIds();
  if (!ids.length) { toast('行を選択してください'); return; }

  const rate = document.getElementById('catRate').value;
  const costRate = document.getElementById('catCostRate').value;
  const effectiveRate = rate !== '' ? rate : '100';

  const newNodes = [];
  ids.forEach(id => {
    const it = _catalogAllItems.find(x => x.id === id);
    if (!it) return;
    const st = _catalogRowState(id);
    const specText = CATALOG_SPEC_FIELDS.map(f => it[f]).filter(Boolean).join('/');
    const n = newLeaf(it.name || '');
    n.spec = specText;
    n.qty = st.qty || '1';
    n.unitCode = st.unit || it.unit || '式';
    n.listPrice = it.list_price != null ? String(it.list_price) : '';
    n.rate = effectiveRate;
    if (costRate !== '') n.costRate = costRate;
    n.note = `カタログ検索: ${it.maker || ''} ${it.category || ''}`.trim();
    recalcRow(n, 'rate');
    newNodes.push(n);
  });
  if (!newNodes.length) { toast('挿入できる行がありません'); return; }

  let target = null;
  if (anchorId != null) {
    const found = findNode(tree, anchorId);
    if (found) target = found.node.isMain ? found.node : (found.parent || null);
  }
  if (!target) target = tree.find(n => n.isMain) || null;

  if (target) {
    newNodes.forEach(n => target.children.push(n));
    target.expanded = true;
  } else {
    newNodes.forEach(n => tree.push(n));
  }
  recalcAll(tree);
  rebaseInit(tree); render();
  closeCatalogOverlay();
  toast(`${newNodes.length}行を追加しました`);
}

loadFromSupabase();
</script>

</body>
</html>
